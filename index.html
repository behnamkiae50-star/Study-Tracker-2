<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#191919;--bg4:#222222;
  --border:#2a2a2a;--border2:#363636;
  --text:#ffffff;--text2:#c8c8c8;--text3:#787878;
  --accent:#1e1e1e;--accent2:#2a2a2a;
  --green:#3dd68c;--yellow:#f5c842;--orange:#f47b3e;--red:#f06b6b;--blue:#5b9ef5;
  --charcoal:#2a2a2a;--charcoal2:#3a3a3a;
  /* hierarchy colors */
  --chapter-color:#7c8fff;--chapter-bg:#7c8fff14;--chapter-border:#7c8fff30;
  --topic-color:#4fc3a1;--topic-bg:#4fc3a114;--topic-border:#4fc3a130;
  --subtopic-color:#e8976a;--subtopic-bg:#e8976a14;--subtopic-border:#e8976a30;
  --base-size:18px;
}
body.light{
  --bg:#f5f5f2;--bg2:#ececea;--bg3:#e2e2de;--bg4:#d6d6d0;
  --border:#c8c8c2;--border2:#b4b4ae;
  --text:#1a1a18;--text2:#2a2a26;--text3:#4a4a44;
  --accent:#e2e2de;--accent2:#d0d0ca;
  --charcoal:#2a2a28;--charcoal2:#3a3a38;
  --green:#16a34a;--yellow:#ca8a04;--orange:#ea580c;--red:#dc2626;--blue:#2563eb;
  --chapter-color:#4a5fd4;--chapter-bg:#4a5fd412;--chapter-border:#4a5fd430;
  --topic-color:#1a8a6e;--topic-bg:#1a8a6e12;--topic-border:#1a8a6e30;
  --subtopic-color:#c0612a;--subtopic-bg:#c0612a12;--subtopic-border:#c0612a30;
}
/* light mode hierarchy text overrides — must stay dark for readability */
body.light .h-chapter-text{color:#111110!important;}
body.light .h-topic-text{color:#1a1a18!important;}
body.light .h-subtopic-text{color:#222220!important;}
body.light #nch-name{background:#3a3a46;color:#ffffff;border-color:#5a5a6a;}
body.light #nch-name::placeholder{color:#aaaacc;}
body.light .gA{background:#16a34a22;border-color:#16a34a;color:#16a34a;}
body.light .gBplus{background:#65a30d22;border-color:#65a30d;color:#65a30d;}
body.light .gB{background:#ca8a0422;border-color:#ca8a04;color:#ca8a04;}
body.light .gC{background:#ea580c22;border-color:#ea580c;color:#ea580c;}
body.light .gD{background:#dc262622;border-color:#dc2626;color:#dc2626;}
body.light .imp-med{background:#1d4ed822;color:#1d4ed8;border-color:#1d4ed866;}
body.light .imp-high{background:#ea580c22;color:#ea580c;border-color:#ea580c66;}
body.light .imp-critical{background:#dc262622;color:#dc2626;border-color:#dc262666;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Vazirmatn',sans-serif;direction:rtl;overflow:hidden;font-size:var(--base-size);}
button{cursor:pointer;border:none;outline:none;font-family:inherit;background:none;}
input,select,textarea{font-family:inherit;direction:rtl;outline:none;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* LAYOUT */
#app{height:100vh;overflow:hidden;display:flex;flex-direction:row;}
#app.app-hidden{display:none!important;}
.cal-layout{display:flex;flex-direction:column;gap:8px;max-width:600px;margin:0 auto;width:100%;}
.cal-left{display:none!important;}
.cal-center{width:100%;}
.cal-right{width:100%;}
#sidebar{width:240px;min-width:240px;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;transition:width 0.25s,min-width 0.25s;overflow:hidden;flex-shrink:0;}
#sidebar.closed{width:0;min-width:0;}
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
#header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0;background:var(--bg2);}
#content{flex:1;overflow-y:auto;padding:18px;background:var(--bg);}

/* روی موبایل sidebar بصورت overlay */
@media(max-width:640px){
  #sidebar{position:fixed;top:0;right:0;bottom:0;z-index:45;transform:translateX(0);transition:transform 0.25s;}
  #sidebar.closed{width:240px;min-width:240px;transform:translateX(100%);}
}
@media(min-width:641px){
  #sidebar{transition:width 0.25s,min-width 0.25s;}
  #sidebar.closed{width:0!important;min-width:0!important;}
}

/* SIDEBAR */
#sidebar-inner{display:flex;flex-direction:column;height:100%;min-width:240px;}
.sidebar-section{padding:10px 12px 4px;font-size:12px;font-weight:600;color:var(--text3);letter-spacing:0.5px;text-transform:uppercase;}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:9px 14px;border-radius:9px;cursor:pointer;font-size:15px;color:var(--text2);transition:all 0.15s;border:none;background:none;width:100%;text-align:right;margin:1px 0;}
.sidebar-item:hover{background:var(--bg3);color:var(--text);}
.sidebar-item.active{background:var(--bg4);color:var(--text);}
.sidebar-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sidebar-courses{flex:1;overflow-y:auto;padding:6px 8px;}
.sidebar-bottom{padding:8px;border-top:1px solid var(--border);}

/* CHAPTER ACCORDION */
.ch-header{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:8px;cursor:pointer;font-size:16px;color:var(--chapter-color);transition:all 0.15s;font-family:'Titr','Vazirmatn',sans-serif;}
.ch-header:hover{background:var(--chapter-bg);color:var(--chapter-color);}
.ch-header.active{color:var(--chapter-color);}
.titr{font-family:'Titr','Vazirmatn',sans-serif;}
.ch-arrow{font-size:12px;transition:transform 0.2s;margin-right:auto;}
.ch-arrow.open{transform:rotate(90deg);}
.ch-topics{padding-right:20px;overflow:hidden;max-height:0;transition:max-height 0.25s ease;}
.ch-topics.open{max-height:999px;}
.ch-topic-item{display:flex;align-items:center;gap:7px;padding:6px 10px;border-radius:7px;font-size:14px;color:var(--topic-color);cursor:pointer;transition:all 0.15s;}
.ch-topic-item:hover{background:var(--topic-bg);color:var(--topic-color);}

/* HEADER */
.icon-btn{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:18px;transition:all 0.15s;border:1px solid var(--border);background:var(--bg2);}
.icon-btn:hover{color:var(--text);border-color:var(--border2);}

/* CARDS */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px 16px;transition:border-color 0.15s;}
.card:hover{border-color:var(--border2);}

/* GRADE BADGE */
.gb{display:inline-flex;align-items:center;justify-content:center;width:24px;height:17px;border-radius:5px;font-size:12px;font-weight:700;flex-shrink:0;}
.gA{background:#4ade8022;border:1.5px solid #4ade80;color:#4ade80;}
.gBplus{background:#a3e63522;border:1.5px solid #a3e635;color:#a3e635;}
.gB{background:#facc1522;border:1.5px solid #facc15;color:#facc15;}
.gC{background:#fb923c22;border:1.5px solid #fb923c;color:#fb923c;}
.gD{background:#f8717122;border:1.5px solid #f87171;color:#f87171;}
.gNone{background:var(--bg4);border:1.5px solid var(--border2);color:var(--text3);}

/* IMPORTANCE */
.imp{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:12px;font-weight:600;}
.imp-low{background:var(--bg4);color:var(--text3);border:1px solid var(--border2);}
.imp-med{background:#60a5fa18;color:#60a5fa;border:1px solid #60a5fa44;}
.imp-high{background:#fb923c18;color:#fb923c;border:1px solid #fb923c44;}
.imp-critical{background:#f8717118;color:#f87171;border:1px solid #f8717144;}

/* PROGRESS */
.pbar{height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.pfill{height:100%;border-radius:2px;transition:width 0.3s;}

/* STAT */
.stat{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.stat-n{font-size:28px;font-weight:800;line-height:1;color:var(--text);}
.stat-l{font-size:13px;color:var(--text3);margin-top:4px;}

/* GRADE BUTTONS */
.grade-btn{padding:7px 13px;border-radius:8px;font-size:14px;font-weight:600;transition:transform 0.1s;}
.grade-btn:active{transform:scale(0.95);}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:50;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:16px;padding:24px 22px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.modal-title{font-size:17px;font-weight:700;margin-bottom:16px;color:var(--text);}
.mi{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:11px 14px;color:var(--text);font-size:16px;}
.mi::placeholder{color:var(--text3);}
.btn-p{width:100%;background:var(--charcoal2);color:#ffffff;padding:12px;border-radius:8px;font-size:16px;font-weight:600;}
.btn-s{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text2);padding:11px;border-radius:8px;font-size:16px;}
.btn-d{width:100%;background:#f8717118;border:1px solid #f87171;color:#f87171;padding:10px;border-radius:8px;font-size:15px;}

/* NOTE */
.note-ta{width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:15px;resize:none;min-height:65px;line-height:1.5;}
.note-ta::placeholder{color:var(--text3);}

/* FLASH */
.flash{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#0a0a0f;padding:9px 22px;border-radius:24px;font-weight:700;font-size:15px;animation:fu 2s ease forwards;z-index:999;}
@keyframes fu{0%{opacity:0;transform:translateX(-50%) translateY(8px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}

/* SINGLE-TOPIC SLIDE ANIMATION */
@keyframes slideInFromLeft{from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)}}
.single-card-enter{animation:slideInFromLeft 0.28s cubic-bezier(0.25,0.46,0.45,0.94) both;}

/* COLOR DOTS */
.cdot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:transform 0.1s;}
.cdot.sel{border-color:var(--text);transform:scale(1.2);}

/* OVERLAY for mobile */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40;}
@media(max-width:640px){
  #sidebar{position:fixed;right:0;top:0;height:100%;z-index:45;transform:translateX(0);transition:transform 0.25s;}
  #sidebar.closed{transform:translateX(100%);width:240px;min-width:240px;}
  #overlay.visible{display:block;}
}
@media(min-width:641px){
  #content{max-width:860px;margin:0 auto;width:100%;}
}
/* SINGLE CARD VIEW */
.single-view-wrap{max-width:480px;margin:0 auto;width:100%;}
@media(min-width:1024px){
  #sidebar{width:260px;min-width:260px;}
  #sidebar.closed{width:260px;min-width:260px;}
  #content{max-width:none;margin:0;padding:24px 32px;}
  .review-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;}
  .stat-grid-desktop{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
}
/* تقویم بدون اسکرول در دسکتاپ */
@media(min-width:641px){
  body.page-calendar #content{overflow-y:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 40px;}
  body.page-calendar .cal-layout{gap:6px;max-width:460px;width:100%;}
}
</style>

    </div>
    <div id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">

<!-- LOGIN SCREEN -->
<div id="login-screen" style="display:none;position:fixed;inset:0;z-index:999;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:32px;">
  <div style="font-size:52px;margin-bottom:16px;">🎓</div>
  <div style="font-size:24px;font-weight:700;margin-bottom:6px;">Study Tracker</div>

  <div style="width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;">

<script>
// ── SESSION ───────────────────────────────────────────────────────────────────
function getSession(){try{return JSON.parse(sessionStorage.getItem('study-session'))||null;}catch{return null;}}

// given a hex color, returns {chapter, topic, subtopic} with darkening steps
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r,g,b};
}
function rgbToHex(r,g,b){
  return'#'+[r,g,b].map(v=>Math.max(0,Math.min(255,Math.round(v))).toString(16).padStart(2,'0')).join('');
}
// darkens a hex color by mixing with black, factor 0..1
function darkenHex(hex,factor){
  const{r,g,b}=hexToRgb(hex);
  return rgbToHex(r*(1-factor),g*(1-factor),b*(1-factor));
}
// desaturate + darken for subtopic (more muted feel)
function muteHex(hex,darken,desat){
  const{r,g,b}=hexToRgb(hex);
  const avg=(r+g+b)/3;
  const mr=r+(avg-r)*desat, mg=g+(avg-g)*desat, mb=b+(avg-b)*desat;
  return rgbToHex(mr*(1-darken),mg*(1-darken),mb*(1-darken));
}
function courseHierarchy(color){
  const isLight=document.body.classList.contains('light');
  const chapter=color;
  const topic=color+'cc';
  const subtopic=color+'b3';
  const chapterText=isLight?'#1a1a18':'#e8e6e0';
  const topicText=isLight?'#2a2a28':'#c8c6c0';
  const subtopicText=isLight?'#3e3e3a':'#a8a6a2';
  return{chapter,topic,subtopic,chapterText,topicText,subtopicText};
}

// ── SMART MERGE ───────────────────────────────────────────────────────────────
// Merge two arrays by id: per-item winner is whichever has a newer updatedAt.
// Items with _deleted:true are kept as tombstones (for 30 days) so deletions propagate.
function mergeArray(local, cloud){
  const map={};
  // load local items first
  (local||[]).forEach(item=>{map[item.id]=item;});
  // merge cloud items: cloud wins if newer or local missing
  (cloud||[]).forEach(cloudItem=>{
    const localItem=map[cloudItem.id];
    if(!localItem){
      map[cloudItem.id]=cloudItem;
    } else {
      const lt=localItem.updatedAt?new Date(localItem.updatedAt).getTime():0;
      const ct=cloudItem.updatedAt?new Date(cloudItem.updatedAt).getTime():0;
      if(ct>lt) map[cloudItem.id]=cloudItem;
    }
  });
  return Object.values(map);
}

// Strip tombstones older than 30 days (cleanup to keep data small)
function purgeTombstones(arr){
  const cutoff=Date.now()-30*24*3600*1000;
  return (arr||[]).filter(item=>{
    if(!item._deleted) return true;
    const t=item.updatedAt?new Date(item.updatedAt).getTime():0;
    return t>cutoff;
  });
}

// Filter out deleted items for UI rendering
function activeItems(arr){return (arr||[]).filter(x=>!x._deleted);}

      });
  }
}

async function syncFromCloud(u, silent=false){
  try{
    const {data,error}=await window._supa.from('user_data').select('data,prefs,updated_at').eq('id',u).single();
    if(error&&error.code!=='PGRST116')return;
    if(data){
      const cloudTime = data.updated_at ? new Date(data.updated_at).getTime() : 0;
      const localTime = parseInt(localStorage.getItem(SK+'_ts')||'0');
      // همیشه merge می‌کنیم تا داده‌های دستگاه‌های دیگه از دست نره
      let changed = false;
      if(data.data){
        const cloud=JSON.parse(data.data);
        if(!cloud.subtopics)cloud.subtopics=[];
        const before=JSON.stringify({c:D.courses,ch:D.chapters,t:D.topics,s:D.subtopics});
        D.courses=mergeArray(D.courses, cloud.courses);
        D.chapters=mergeArray(D.chapters, cloud.chapters);
        D.topics=mergeArray(D.topics, cloud.topics);
        D.subtopics=mergeArray(D.subtopics, cloud.subtopics);
        const after=JSON.stringify({c:D.courses,ch:D.chapters,t:D.topics,s:D.subtopics});
        changed = (before !== after);
        // کرنومتر/تایمر: فقط اگه cloud جدیدتره بازنویسی می‌کنیم
        if(cloudTime > localTime){
          if(cloud.swSeconds!==undefined)D.swSeconds=cloud.swSeconds;
          if(cloud.timerSeconds!==undefined){D.timerSeconds=cloud.timerSeconds;D.timerMode=cloud.timerMode||'custom';}
        }
        const newTs = Math.max(cloudTime, localTime, Date.now());
        localStorage.setItem(SK,JSON.stringify(D));
        localStorage.setItem(SK+'_ts', newTs);
        // نتیجه merge رو به cloud پوش می‌کنیم
        if(changed){
          window._supa.from('user_data').upsert({id:window._sbUser.id, data:JSON.stringify(D), updated_at:new Date().toISOString()}).then(()=>{});
        }
      }
      if(data.prefs && cloudTime > localTime){P=JSON.parse(data.prefs);localStorage.setItem(PK,JSON.stringify(P));}
      ldSw();
      applyTheme();render();
      // بررسی وضعیت running زمان‌سنج روی دستگاه‌های دیگر
      restoreRunningState();
      if(!silent && changed) showToast('اطلاعات ادغام شد ☁️','info');
    }
  }catch(e){}
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today(){
  // تاریخ ایران (UTC+3:30) — نه UTC
  const d=new Date(Date.now()+3.5*3600*1000);
  return d.toISOString().split('T')[0];
}
function addDays(d,n){const x=new Date(d+'T00:00:00Z');x.setUTCDate(x.getUTCDate()+n);return x.toISOString().split('T')[0];}
function daysDiff(d){return Math.round((new Date(d+'T00:00:00Z')-new Date(today()+'T00:00:00Z'))/(864e5));}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function gs(g){return{A:100,Bplus:85,B:65,C:40,D:10}[g]??0;}
function stReady(s){if(!s.history.length)return null;const l=s.history.slice(-5);return Math.round(l.reduce((a,h)=>a+gs(h.grade),0)/l.length);}
function tReady(t){
  const subs=getSubtopics(t.id);
  if(subs.length){const sc=subs.filter(s=>s.history.length).map(s=>stReady(s)).filter(x=>x!==null);return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;}
  if(!t.history.length)return null;
  const l=t.history.slice(-5);return Math.round(l.reduce((s,h)=>s+gs(h.grade),0)/l.length);
}
function cReady(chId){const ts=activeItems(D.topics).filter(t=>t.chapterId===chId);if(!ts.length)return null;const sc=ts.map(t=>tReady(t)).filter(x=>x!==null);return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;}
function crsReady(cId){const chs=activeItems(D.chapters).filter(c=>c.courseId===cId);const sc=chs.map(c=>cReady(c.id)).filter(x=>x!==null);return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):null;}
function rc(r){
  if(r===null)return'var(--text3)';
  const light=document.body.classList.contains('light');
  if(r>=80)return light?'#15803d':'#4ade80';
  if(r>=60)return light?'#4d7c0f':'#a3e635';
  if(r>=40)return light?'#a16207':'#facc15';
  if(r>=20)return light?'#c2410c':'#fb923c';
  return light?'#b91c1c':'#f87171';
}
function getCh(t){return activeItems(D.chapters).find(c=>c.id===t.chapterId);}
function getCrs(t){const ch=getCh(t);return ch?activeItems(D.courses).find(c=>c.id===ch.courseId):null;}

function gb(g){if(!g)return`<span class="gb gNone">—</span>`;const k=g.replace('+','plus');return`<span class="gb g${k}">${GC[g]?.l??g}</span>`;}
function ib(i){if(!i)return'';return`<span class="imp ${IC[i].cls}">${IC[i].l}</span>`;}
function flash(msg,color){document.querySelectorAll('.flash').forEach(e=>e.remove());const el=document.createElement('div');el.className='flash';el.textContent=msg;if(color)el.style.background=color;document.body.appendChild(el);setTimeout(()=>el.remove(),2300);}
function relDate(d){if(!d||d==='—')return'—';const diff=daysDiff(d);if(diff===0)return'امروز';if(diff<0)return toFa(Math.abs(diff))+' روز پیش';return toFa(diff)+' روز دیگر';}

const TITLES={dashboard:'داشبورد',review:'مرور امروز',settings:'تنظیمات',calendar:'تقویم مطالعه',timer:'زماسنج مطالعه',trash:'سطل زباله',progress:'نمودار پیشرفت'};
function goto(p){
  // وقتی از یه درس یا مرور خارج میشیم، state رو reset کن
  if(page.startsWith('course:')){
    // وقتی از صفحه درس خارج میشیم (چه به صفحه دیگه، چه به درس دیگه) سرفصل‌ها بسته بشن
    if(!p.startsWith('course:') || p!==page){
      openChapterId=null;
      openTopics={};
    }
  }
  if(page==='review' && p!=='review'){
    // scroll مرور به بالا موقع بازگشت
    window._reviewScrollTarget=null;
    window._reviewSelectedCourse=null;
  }
  // وقتی navigate می‌کنیم به صفحه review از جای دیگه، باید بره بالا
  if(p==='review' && page!=='review'){
    window._reviewNavFlag=true;
  }
  // وقتی navigate می‌کنیم به یه صفحه درس، باید بره بالای صفحه
  if(p.startsWith('course:')) window._courseNavScroll=true;
  page=p;gradingId=null;editingCourseId=null;editingChapterId=null;
  // اضافه کردن کلاس صفحه به body برای استایل‌های مخصوص
  document.body.className=document.body.className.replace(/\bpage-\S+/g,'').trim();
  document.body.classList.add('page-'+(p.startsWith('course:')?'course':p));
  const title=p.startsWith('course:')?D.courses.find(c=>c.id===p.split(':')[1])?.name??'':TITLES[p]??'';
  document.getElementById('h-title').textContent=title;
  const due=reviewableItems().length;
  document.getElementById('h-sub').textContent=due>0?`${toFa(due)} موضوع برای مرور`:'';
  updateSidebarActive();
  if(isMobile())closeSidebar();
  render();
  renderGlobalTimerBar();
}

function render(){
  const c=document.getElementById('content');
  const savedScroll=c.scrollTop;
  if(page==='dashboard')c.innerHTML=renderDashboard();
  else if(page==='review'){
    c.innerHTML=renderReview();
    if(window._reviewNavFlag){
      window._reviewNavFlag=false;
      c.scrollTop=0;
    } else {
      c.scrollTop=savedScroll;
    }
  }
  else if(page==='settings')c.innerHTML=renderSettings();
  else if(page==='calendar')c.innerHTML=renderCalendar();
  else if(page==='timer'){c.innerHTML=renderTimer();initTimer();}
  else if(page==='trash')c.innerHTML=renderTrash();
  else if(page==='progress'){c.innerHTML=renderProgressChart();initProgressChart();}
  else if(page.startsWith('course:')){
    c.innerHTML=renderCourse(page.split(':')[1]);
    if(window._courseNavScroll){
      c.scrollTop=0;
      window._courseNavScroll=false;
    } else {
      c.scrollTop=savedScroll;
    }
  }
  renderSidebar();
  renderFab();
  applyZoom();
}

function renderOverallChart(){
  // جمع‌آوری همه history از topics و subtopics
  const allHistory=[];
  activeItems(D.topics).forEach(t=>{
    t.history.forEach(h=>allHistory.push({date:h.date,score:gs(h.grade)}));
    getSubtopics(t.id).forEach(s=>{
      s.history.forEach(h=>allHistory.push({date:h.date,score:gs(h.grade)}));
    });
  });
  if(allHistory.length<1)return'';

  const byDate={};
  allHistory.forEach(({date,score})=>{
    if(!byDate[date])byDate[date]={sum:0,count:0};
    byDate[date].sum+=score;byDate[date].count+=1;
  });
  const dates=Object.keys(byDate).sort();

  const points=dates.map(d=>({date:d,avg:Math.round(byDate[d].sum/byDate[d].count)}));
  const last=points[points.length-1];
  const isLight=document.body.classList.contains('light');

  // رنگ‌بندی
  const lineColor=last.avg>=75?(isLight?'#16a34a':'#22d3ee'):last.avg>=50?(isLight?'#d97706':'#fbbf24'):(isLight?'#dc2626':'#f87171');
  const gridColor=isLight?'rgba(0,0,0,0.07)':'rgba(255,255,255,0.06)';
  const labelColor=isLight?'#9998aa':'#6b6a7a';
  const axisColor=isLight?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.1)';

  // ابعاد — padding کافی از همه طرف
  const W=300, H=140;
  const PL=38, PR=20, PT=20, PB=34;
  const iW=W-PL-PR, iH=H-PT-PB;

  const yPos=v=>PT+iH-((v/100)*iH);
  // اگر فقط یک نقطه داریم، وسط بگذار؛ وگرنه spread کن
  const xPos=i=>points.length===1?PL+iW/2:PL+i*(iW/(points.length-1));

  // مسیر خط و fill
  const pathD=points.map((p,i)=>`${i===0?'M':'L'}${xPos(i).toFixed(1)},${yPos(p.avg).toFixed(1)}`).join(' ');
  const fillD=points.length>1
    ?pathD+` L${xPos(points.length-1).toFixed(1)},${(PT+iH).toFixed(1)} L${xPos(0).toFixed(1)},${(PT+iH).toFixed(1)} Z`
    :'';

  const lastX=xPos(points.length-1);
  const lastY=yPos(last.avg);

  // برچسب آخر: بالا یا پایین بسته به فضا
  const labelAbove=lastY>PT+26;
  const labelY=labelAbove?lastY-14:lastY+26;

  // تاریخ‌ها — فقط اول و آخر (اگر متفاوت)
  const fmt=d=>{const p=d.split('-');return`${toFa(parseInt(p[1]))}/${toFa(parseInt(p[2]))}`;};
  const showBothDates=points.length>1&&dates[0]!==dates[dates.length-1];

  // خطوط grid — فقط ۲۵، ۵۰، ۷۵
  const gridLines=[25,50,75];

  return`<div style="margin-top:20px;">
    <div style="font-size:13px;font-weight:600;color:var(--text3);margin-bottom:8px;text-align:right;letter-spacing:0.3px;">روند آمادگی کلی</div>
    <div class="card" style="padding:14px 12px 10px;background:var(--bg2);overflow:hidden;">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="auto" style="display:block;overflow:hidden;">
        <defs>
          <linearGradient id="cFill2" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.22"/>
            <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.01"/>
          </linearGradient>
          <clipPath id="cClip2">
            <rect x="${PL}" y="${PT}" width="${iW}" height="${iH}"/>
          </clipPath>
        </defs>

        <!-- محور Y و X -->
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+iH}" stroke="${axisColor}" stroke-width="1"/>
        <line x1="${PL}" y1="${PT+iH}" x2="${PL+iW}" y2="${PT+iH}" stroke="${axisColor}" stroke-width="1"/>

        <!-- خطوط grid افقی -->
        ${gridLines.map(v=>{
          const y=yPos(v);
          return`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${PL+iW}" y2="${y.toFixed(1)}" stroke="${gridColor}" stroke-width="0.8" stroke-dasharray="3,4"/>
          <text x="${(PL-5).toFixed(1)}" y="${(y+3.5).toFixed(1)}" font-size="8.5" fill="${labelColor}" text-anchor="end" font-family="Vazirmatn,sans-serif">${toFa(v)}</text>`;
        }).join('')}
        <!-- برچسب ۰ و ۱۰۰ -->
        <text x="${(PL-5).toFixed(1)}" y="${(yPos(0)+3.5).toFixed(1)}" font-size="8.5" fill="${labelColor}" text-anchor="end" font-family="Vazirmatn,sans-serif">۰</text>
        <text x="${(PL-5).toFixed(1)}" y="${(yPos(100)+3.5).toFixed(1)}" font-size="8.5" fill="${labelColor}" text-anchor="end" font-family="Vazirmatn,sans-serif">۱۰۰</text>

        <!-- fill -->
        ${fillD?`<path d="${fillD}" fill="url(#cFill2)" clip-path="url(#cClip2)"/>`:''}

        <!-- خط اصلی -->
        ${points.length>1?`<path d="${pathD}" fill="none" stroke="${lineColor}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#cClip2)"/>`:''}

        <!-- نقاط -->
        ${points.length<=16?points.map((p,i)=>{
          const cx=xPos(i).toFixed(1);
          const cy=yPos(p.avg).toFixed(1);
          return`<circle cx="${cx}" cy="${cy}" r="${i===points.length-1?'4.5':'2.2'}" fill="${lineColor}" stroke="var(--bg2)" stroke-width="${i===points.length-1?'2':'1'}" opacity="${i===points.length-1?'1':'0.65'}"/>`;
        }).join(''):''}

        <!-- برچسب درصد روی آخرین نقطه -->
        <rect x="${(lastX-17).toFixed(1)}" y="${(labelY-11).toFixed(1)}" width="34" height="15" rx="4" fill="${lineColor}" opacity="0.92"/>
        <text x="${lastX.toFixed(1)}" y="${(labelY).toFixed(1)}" font-size="9" fill="${isLight?'#fff':'#0a0a0f'}" text-anchor="middle" font-weight="700" font-family="Vazirmatn,sans-serif">${toFa(last.avg)}%</text>
        <!-- خط اتصال برچسب به نقطه -->
        ${labelAbove?`<line x1="${lastX.toFixed(1)}" y1="${(lastY-5).toFixed(1)}" x2="${lastX.toFixed(1)}" y2="${(labelY-12).toFixed(1)}" stroke="${lineColor}" stroke-width="1" opacity="0.5"/>`
        :`<line x1="${lastX.toFixed(1)}" y1="${(lastY+5).toFixed(1)}" x2="${lastX.toFixed(1)}" y2="${(labelY-12).toFixed(1)}" stroke="${lineColor}" stroke-width="1" opacity="0.5"/>`}

        <!-- برچسب‌های تاریخ — فقط اول و آخر -->
        ${showBothDates?`
          <text x="${PL.toFixed(1)}" y="${H-4}" font-size="8.5" fill="${labelColor}" text-anchor="start" font-family="Vazirmatn,sans-serif">${fmt(dates[0])}</text>
          <text x="${(PL+iW).toFixed(1)}" y="${H-4}" font-size="8.5" fill="${labelColor}" text-anchor="end" font-family="Vazirmatn,sans-serif">${fmt(dates[dates.length-1])}</text>
        `:points.length===1?`
          <text x="${lastX.toFixed(1)}" y="${H-4}" font-size="8.5" fill="${labelColor}" text-anchor="middle" font-family="Vazirmatn,sans-serif">${fmt(dates[0])}</text>
        `:''}
      </svg>
    </div>
  </div>`;
}

function renderDashboard(){
  const due=reviewableItems();

  const allSc=activeItems(D.topics).filter(t=>t.history.length||hasSubtopics(t.id)).map(t=>tReady(t)).filter(x=>x!==null);
  const overall=allSc.length?Math.round(allSc.reduce((a,b)=>a+b,0)/allSc.length):null;

  const todayOnly=due.filter(item=>!(item.type==='topic'?item.t.nextReview<today():item.s.nextReview<today()));
  const streak=getStudyStreak();
  const todayCnt=getTodayStudyCount();
  const weekDays=getWeekStudyDays();
  let html=`<div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:20px;padding:10px 0;">
    <div class="stat" style="width:100%;text-align:center;cursor:default;">
      <div class="stat-n" style="color:${rc(overall)};font-size:42px;">${overall!==null?toFa(overall)+'%':'—'}</div>
      <div class="stat-l">آمادگی کلی</div>
    </div>
    <div style="display:flex;gap:10px;width:100%;">
      <div class="stat" style="flex:1;text-align:center;cursor:pointer;" onclick="reviewMode='today';window._reviewScrollTarget=null;window._reviewSelectedCourse=null;goto('review')">
        <div class="stat-n" style="color:${todayOnly.length>0?rc(30):rc(100)}">${toFa(todayOnly.length)}</div>
        <div class="stat-l">برای امروز</div>
      </div>
      <div class="stat" style="flex:1;text-align:center;cursor:pointer;" onclick="reviewMode='overdue';window._reviewScrollTarget=null;window._reviewSelectedCourse=null;goto('review')">
        <div class="stat-n" style="color:${overdue.length>0?rc(0):'var(--text3)'}">${toFa(overdue.length)}</div>
        <div class="stat-l" style="${overdue.length>0?'color:#f87171;font-weight:700;':''}">عقب‌افتاده</div>
      </div>
    </div>
    <div style="display:flex;gap:10px;width:100%;">
      <div class="stat" style="flex:1;text-align:center;cursor:pointer;" onclick="goto('calendar')">
        <div class="stat-n" style="color:${streak>0?'#f5c842':'var(--text3)'};">${streak>0?toFa(streak)+'🔥':'—'}</div>
        <div class="stat-l">روز متوالی</div>
        ${getStreakLevel(streak)?`<div style="font-size:11px;margin-top:3px;color:#f5c842;opacity:0.8;">${getStreakLevel(streak)}</div>`:''}
      </div>
    </div>
  </div>`;

  if(due.length){
    html+=`<div style="font-size:17px;font-weight:600;color:var(--text3);margin-bottom:10px;letter-spacing:0.4px;">امروز چی مرور کنم</div>`;
    html+=`<div class="review-grid">`;
    due.slice(0,6).forEach(item=>{
      const t=item.t;
      const name=item.type==='sub'?item.s.name:t.name;
      const grade=item.type==='sub'?item.s.lastGrade:t.lastGrade;
      const c=getCrs(t),ch=getCh(t);
      const diff=item.type==='sub'?daysDiff(item.s.nextReview):daysDiff(t.nextReview);
      const isOverdueItem=diff<0;
      html+=`<div class="card" style="margin-bottom:8px;cursor:pointer;${isOverdueItem?'border-right:3px solid #f8717166;':''}" onclick="reviewMode=${isOverdueItem?"'overdue'":"'today'"};window._reviewScrollTarget=null;window._reviewSelectedCourse=null;goto('review')">
        <div style="display:flex;align-items:center;gap:10px;">
          ${gb(grade)}
          <div style="flex:1;min-width:0;">
            <div style="font-size:17px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
            <div style="font-size:13px;color:var(--text3);margin-top:2px;">${c?c.name:''} ${ch?'/ '+ch.name:''} ${item.type==='sub'?'/ '+t.name:''}</div>
          </div>
          ${diff<0?`<span style="font-size:13px;color:#f87171;flex-shrink:0;">${toFa(Math.abs(diff))}روز تأخیر</span>`:`<span style="font-size:13px;color:#facc15;flex-shrink:0;">امروز</span>`}
        </div>
      </div>`;
    });
    html+=`</div>`;
    if(due.length>6)html+=`<div style="text-align:center;font-size:14px;color:var(--text3);padding:8px;">و ${toFa(due.length-6)} مورد دیگر...</div>`;
  }

  return html;
}

function renderCourse(cId){
  const c=D.courses.find(x=>x.id===cId);if(!c)return'';
  const chs=activeItems(D.chapters).filter(ch=>ch.courseId===cId);
  const r=crsReady(cId);
  const isCourseEditing=editingCourseId===cId;
  const isDragMode=!!chapterDragMode[cId];

  const H=courseHierarchy(c.color);
  let html='';

  // Header
  html+=`<div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">`;
  html+=`<span style="width:12px;height:12px;border-radius:50%;background:${c.color};flex-shrink:0;"></span>`;

    html+=`<input id="inline-course-${cId}" class="mi" value="${c.name.replace(/"/g,'&quot;')}" style="flex:1;padding:7px 10px;font-size:18px;font-weight:700;" onkeydown="if(event.key==='Enter')saveCourseInline('${cId}');if(event.key==='Escape')cancelCourseEdit();"/>`;

    html+=`<button onclick="deleteCourse('${cId}')" style="padding:6px 10px;background:#f8717118;border:1px solid #f87171;color:#f87171;border-radius:7px;font-size:13px;">حذف</button>`;
    html+=`</div>`;
    html+=`<div style="margin-bottom:14px;"><div style="font-size:12px;color:var(--text3);margin-bottom:8px;">رنگ درس</div>${renderColorPicker(selColor2,"selColor2=COLOR;")}</div>`;
  } else {
    html+=`<span style="font-size:18px;font-weight:700;flex:1;">${c.name}</span>`;
    html+=`${r!==null?'<span style="font-size:17px;font-weight:700;color:'+rc(r)+';margin-left:4px;">'+toFa(r)+'%</span>':''}`;
    html+=`<button onclick="startCourseEdit('${cId}')" style="color:var(--text3);font-size:16px;">✏️</button>`;
    html+=`</div>`;
  }
  html+=`<div class="pbar" style="margin-bottom:14px;"><div class="pfill" style="width:${r??0}%;background:${rc(r)};"></div></div>`;

  if(!isCourseEditing){
    html+=`<div style="display:flex;gap:8px;margin-bottom:14px;">`;
    html+=`<button class="btn-p" style="flex:1;padding:10px;border-radius:8px;font-size:17px;color:#ffffff;background:${H.chapter};border:none;" onclick="openAddChapter('${cId}')">+ سرفصل جدید</button>`;

        ?'border:1px solid var(--green);background:#4ade8018;color:var(--green);'
        :'border:1px solid var(--border);background:var(--bg3);color:var(--text3);';
      html+=`<button onclick="toggleChapterDragMode('${cId}')" style="padding:10px 14px;border-radius:8px;font-size:15px;font-weight:600;${dragBtnStyle}">${isDragMode?'✓ پایان':'⇅ ترتیب'}</button>`;
    }

        ontouchmove="onChTouchMove(event)"

            ontouchmove="onTopTouchMove(event)"
            ontouchend="onTopTouchEnd(event,'${ch.id}')">`;
          html+=`<span style="color:var(--text3);font-size:16px;flex-shrink:0;">⋮⋮</span>`;
          html+=`<div style="flex:1;min-width:0;"><div style="font-size:15px;font-weight:500;">${t.name}</div>`;

            html+=`</div><span style="font-size:14px;font-weight:700;color:${rc(tr)};">${tr!==null?toFa(tr)+'%':'—'}</span></div>`;
            // subtopics drag inside
            html+=`<div style="margin-top:6px;padding-top:6px;border-top:1px dashed var(--border);">`;
            subs.forEach(s=>{
              html+=`<div class="sub-drag-item" data-sid="${s.id}" data-tid="${t.id}" draggable="true"
                style="display:flex;align-items:center;gap:8px;background:var(--bg4);border:1px solid var(--border);border-radius:7px;padding:8px 10px;margin-bottom:5px;cursor:grab;touch-action:none;user-select:none;"

              html+=`<span style="font-size:14px;flex:1;">${s.name}</span>`;
              html+=`</div>`;
            });
            html+=`</div>`;
          } else {
            html+=`</div><span style="font-size:14px;font-weight:700;color:${rc(tr)};">${tr!==null?toFa(tr)+'%':'—'}</span>`;
          }
          html+=`</div>`;
        });
        html+=`</div>`;
      }
      html+=`</div>`;
    });
    html+=`</div>`;
    return html;
  }

  // ── Normal mode ──
  chs.forEach(ch=>{
    const tops=activeItems(D.topics).filter(t=>t.chapterId===ch.id);
    const r2=cReady(ch.id);
    const isOpen=openChapterId===ch.id;
    const isEditing=editingChapterId===ch.id;

    html+=`<div id="ch-${ch.id}" class="card" style="margin-bottom:10px;border-color:${H.chapter}30;background:linear-gradient(135deg,var(--bg2) 0%,${H.chapter}0d 100%);">`;
    html+=`<div style="display:flex;align-items:center;gap:10px;">`;

    if(isEditing){
      html+=`<div style="flex:1;"><div style="display:flex;align-items:center;gap:8px;">`;

      html+=`<button onclick="deleteChapter('${ch.id}')" style="padding:6px 10px;background:#f8717118;border:1px solid #f87171;color:#f87171;border-radius:7px;font-size:13px;">حذف</button>`;
      html+=`</div></div>`;
    } else {
      html+=`<div style="flex:1;cursor:pointer;" onclick="togglePageChapter('${ch.id}')">`;
      html+=`<div style="font-size:17px;font-weight:600;font-family:'Titr','Vazirmatn',sans-serif;color:${H.chapterText};">${ch.name}</div>`;
      html+=`<div style="font-size:13px;color:var(--text3);margin-top:2px;">${toFa(tops.length)} موضوع</div>`;
      html+=`</div>`;
      html+=`${r2!==null?'<span style="font-size:17px;font-weight:700;color:'+rc(r2)+';">'+toFa(r2)+'%</span>':''}`;
      html+=`<button onclick="event.stopPropagation();startChapterEdit('${ch.id}')" style="color:var(--text3);font-size:16px;padding:2px 4px;">✏️</button>`;
      html+=`<span style="color:${H.chapterText};font-size:18px;cursor:pointer;transition:transform 0.2s;${isOpen?'transform:rotate(90deg)':''}" onclick="togglePageChapter('${ch.id}')">›</span>`;
    }
    html+=`</div>`;

    if(isOpen){
      html+=`<div style="margin-top:10px;border-top:1px solid ${H.chapter}25;padding-top:10px;">`;
      html+=`<div class="pbar" style="margin-bottom:10px;"><div class="pfill" style="width:${r2??0}%;background:${H.chapter};"></div></div>`;
      html+=`<div class="review-grid">`;
      tops.forEach(t=>{
        const diff=daysDiff(t.nextReview);
        const lastR=t.history.length?t.history[t.history.length-1].date:'—';
        const tr=tReady(t);
        const subs=getSubtopics(t.id);
        const hasSubs=subs.length>0;
        html+=`<div class="card" style="margin-bottom:7px;background:var(--bg3);border-color:${H.topic}30;" id="t-${t.id}">`;
        html+=`<div style="display:flex;align-items:center;gap:9px;">`;
        html+=`<div style="flex:1;min-width:0;">`;
        html+=`<div style="display:flex;align-items:center;gap:7px;">${gb(hasSubs?null:t.lastGrade)}<span style="font-size:16px;font-weight:500;color:${H.topicText};">${t.name}</span></div>`;
        html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px;row-gap:3px;">`;
        if(t.importance)html+=ib(t.importance);
        if(!hasSubs){
          html+=`<span style="font-size:13px;color:var(--text3);">آخرین: ${relDate(lastR)}</span>`;
          html+=`<span style="font-size:13px;color:${diff<=0?'#fb923c':'var(--text3)'};">بعدی: ${diff===0?'امروز':diff<0?toFa(Math.abs(diff))+' تأخیر':toFa(diff)+' روز دیگر'}</span>`;
        }
        html+=`</div>`;
        if(!hasSubs)html+=trendChart(t.history);
        html+=`</div>`;
        html+=`<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">`;
        if(tr!==null)html+=`<span style="font-size:17px;font-weight:700;color:${rc(tr)};">${toFa(tr)}%</span>`;
        html+=`<div style="display:flex;gap:6px;">`;
        if(hasSubs)html+=`<button onclick="event.stopPropagation();toggleTopicOpen('${t.id}')" style="color:${H.topicText};font-size:17px;padding:2px 6px;border:1px solid ${H.topic}40;border-radius:6px;">${openTopics[t.id]?'▲':'▼'}</button>`;
        html+=`<button onclick="openTopicMenu('${t.id}')" style="color:var(--text3);font-size:18px;line-height:1;">⋮</button>`;
        html+=`</div></div></div>`;
        if(!hasSubs&&gradingId===t.id)html+=gradeRow(t.id);
        if(hasSubs){
          html+=`<div style="margin-top:8px;border-top:1px solid ${H.topic}25;padding-top:8px;">`;
          html+=`<div style="font-size:12px;color:${H.topicText};opacity:0.85;margin-bottom:6px;">${toFa(subs.length)} زیرموضوع</div>`;
          if(openTopics[t.id]){
            subs.forEach(s=>{
              const sdiff=daysDiff(s.nextReview);
              const slastR=s.history.length?s.history[s.history.length-1].date:'—';
              html+=`<div style="background:var(--bg4);border:1px solid ${H.subtopic}35;border-radius:8px;padding:10px 12px;margin-bottom:6px;" id="s-${s.id}">`;
              html+=`<div style="display:flex;align-items:flex-start;gap:8px;">${gb(s.lastGrade)}`;
              html+=`<div style="flex:1;min-width:0;">`;
              html+=`<div style="font-size:15px;font-weight:500;color:${H.subtopicText};">${s.name}</div>`;
              html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:3px;row-gap:3px;">`;
              html+=`<span style="font-size:13px;color:var(--text3);">آخرین: ${relDate(slastR)}</span>`;
              html+=`<span style="font-size:13px;color:${sdiff<=0?'#fb923c':'var(--text3)'};">بعدی: ${sdiff===0?'امروز':sdiff<0?toFa(Math.abs(sdiff))+' تأخیر':toFa(sdiff)+' روز دیگر'}</span>`;
              html+=`</div>${trendChart(s.history)}</div>`;
              html+=`<button onclick="openSubtopicMenu('${s.id}')" style="color:var(--text3);font-size:18px;">⋮</button>`;
              html+=`</div>`;
              if(gradingId===s.id)html+=subGradeRow(s.id);
              html+=`</div>`;
            });
            html+=`<button onclick="openAddSubtopic('${t.id}')" style="width:100%;padding:7px;background:${H.subtopic}12;border:1px dashed ${H.subtopic}50;border-radius:8px;color:${H.subtopicText};font-size:15px;margin-top:2px;">+ زیرموضوع جدید</button>`;
          } else {
            html+=`<button onclick="toggleTopicOpen('${t.id}')" style="width:100%;padding:6px;background:${H.subtopic}10;border:1px solid ${H.subtopic}40;border-radius:8px;color:${H.subtopicText};font-size:15px;">نمایش زیرموضوعات ▼</button>`;
          }
          html+=`</div>`;
        }
        html+=`</div>`;
      });
      html+=`</div>`; // close review-grid
      html+=`<button onclick="openAddTopic('${ch.id}')" style="width:100%;padding:8px;background:${H.topic}10;border:1px dashed ${H.topic}40;border-radius:8px;color:${H.topicText};font-size:15px;margin-top:4px;">+ موضوع جدید</button>`;
      html+=`</div>`;
    }
    html+=`</div>`;
  });
  return html;
}
function togglePageChapter(id){
  openChapterId=(openChapterId===id)?null:id;
  render();
}
function toggleDragChapter(id){
  dragOpenChapters[id]=!dragOpenChapters[id];
  render();
}

// ── REVIEW ────────────────────────────────────────────────────────────────────
function reviewableItems(){
  // فقط آیتم‌هایی که هنوز باید مرور بشن (nextReview امروز یا قبل، و امروز مرور نشدن)
  const todayStr=today();
  const items=[];
  activeItems(D.topics).forEach(t=>{
    const subs=getSubtopics(t.id);
    if(subs.length){
      subs.forEach(s=>{
        const reviewedToday=(s.history||[]).some(h=>h.date===todayStr);
        if(s.nextReview<=todayStr && !reviewedToday) items.push({type:'sub',t,s});
      });
    } else {
      const reviewedToday=(t.history||[]).some(h=>h.date===todayStr);
      if(t.nextReview<=todayStr && !reviewedToday) items.push({type:'topic',t});
    }
  });
  return items;
}

function overdueItems(){
  // آیتم‌هایی که nextReview قبل از امروز است
  // موضوعات تازه اضافه شده (history خالی) هرگز overdue نیستند
  const todayStr=today();
  return reviewableItems().filter(item=>{
    if(item.type==='topic'){
      if(!(item.t.history||[]).length) return false; // تازه اضافه شده
      return item.t.nextReview<todayStr;
    } else {
      if(!(item.s.history||[]).length) return false; // تازه اضافه شده
      return item.s.nextReview<todayStr;
    }
  });
}

function todayOnlyItems(){
  // آیتم‌هایی که nextReview دقیقاً امروز است
  const todayStr=today();
  return reviewableItems().filter(item=>
    item.type==='topic'?item.t.nextReview===todayStr:item.s.nextReview===todayStr
  );
}

function renderReview(){
  const todayStr=today();
  const isOverdueMode=reviewMode==='overdue';

  // آیتم‌هایی که باید در این حالت نمایش داده شوند
  const modeItems=isOverdueMode?overdueItems():todayOnlyItems();

  // برای progress bar: آیتم‌های کل روز (مرور شده + نشده)
  const allTodayItems=[];
  activeItems(D.topics).forEach(t=>{
    const subs=getSubtopics(t.id);
    if(subs.length){
      subs.forEach(s=>{
        const reviewedToday=(s.history||[]).some(h=>h.date===todayStr);
        if(s.nextReview<=todayStr || reviewedToday) allTodayItems.push({type:'sub',t,s});
      });
    } else {
      const reviewedToday=(t.history||[]).some(h=>h.date===todayStr);
      if(t.nextReview<=todayStr || reviewedToday) allTodayItems.push({type:'topic',t});
    }
  });

  if(!allTodayItems.length && !isOverdueMode)return`<div style="text-align:center;padding:60px 20px;">
    <div style="font-size:50px;margin-bottom:12px;">✓</div>
    <div style="font-size:17px;font-weight:600;color:var(--green);">برای امروز تمومه!</div>
    <div style="font-size:17px;color:var(--text3);margin-top:6px;">${toFa(activeItems(D.topics).length)} موضوع در سیستم</div>
  </div>`;

  if(isOverdueMode && !modeItems.length)return`
    <div style="margin-bottom:14px;">
      <button onclick="reviewMode='today';render()" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text2);font-size:13px;cursor:pointer;">
        ← مرور امروز
      </button>
    </div>
    <div style="text-align:center;padding:60px 20px;">
      <div style="font-size:50px;margin-bottom:12px;">✅</div>
      <div style="font-size:17px;font-weight:600;color:var(--green);">هیچ موضوع عقب‌افتاده‌ای وجود ندارد!</div>
    </div>`;

  // گروه‌بندی بر اساس درس
  const groups={};

  if(isOverdueMode){
    // pendingItems = آیتم‌های عقب‌افتاده که هنوز مرور نشدن
    modeItems.forEach(item=>{
      const t=item.t;
      const c=getCrs(t);
      const key=c?c.id:'other';
      if(!groups[key])groups[key]={c,items:[],pendingItems:[]};
      groups[key].pendingItems.push(item);
    });
    // items = همه آیتم‌های عقب‌افتاده (مرور شده + نشده) برای progress bar
    // یعنی آیتم‌هایی که nextReview < today (صرف‌نظر از مرور شدن امروز)
    const todayStr2=today();
    activeItems(D.topics).forEach(t=>{
      const subs=getSubtopics(t.id);
      if(subs.length){
        subs.forEach(s=>{
          if(s.nextReview<todayStr2 && (s.history||[]).length){
            const c=getCrs(t);
            const key=c?c.id:'other';
            if(!groups[key])groups[key]={c,items:[],pendingItems:[]};
            const reviewedToday=(s.history||[]).some(h=>h.date===todayStr2);
            if(reviewedToday) groups[key].items.push({type:'sub',t,s});
          }
        });
      } else {
        if(t.nextReview<todayStr2 && (t.history||[]).length){
          const c=getCrs(t);
          const key=c?c.id:'other';
          if(!groups[key])groups[key]={c,items:[],pendingItems:[]};
          const reviewedToday=(t.history||[]).some(h=>h.date===todayStr2);
          if(reviewedToday) groups[key].items.push({type:'topic',t});
        }
      }
    });
    // items = pending + reviewed (هر دو باهم)
    Object.values(groups).forEach(grp=>{
      grp.items=[...grp.pendingItems,...grp.items];
    });
  } else {
    // برای حالت امروز، allTodayItems رو برای ساختار گروه استفاده می‌کنیم
    allTodayItems.forEach(item=>{
      const t=item.t;
      const c=getCrs(t);
      const key=c?c.id:'other';
      if(!groups[key])groups[key]={c,items:[],pendingItems:[]};
      groups[key].items.push(item);
    });
    modeItems.forEach(item=>{
      const t=item.t;
      const c=getCrs(t);
      const key=c?c.id:'other';
      if(groups[key]) groups[key].pendingItems.push(item);
    });
  }

  // اگه درسی انتخاب شده، موضوعات اون درس رو نشون بده
  const selCourse=window._reviewSelectedCourse;
  if(selCourse){
    const grp=groups[selCourse];
    if(!grp||!grp.pendingItems.length){
      window._reviewSelectedCourse=null;
      return renderReviewCourseList(groups, isOverdueMode);
    }
    const c=grp.c;
    let html=``;
    // دکمه برگشت
    html+=`<button onclick="window._reviewSelectedCourse=null;render()" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text2);font-size:13px;cursor:pointer;margin-bottom:16px;">
      ← بازگشت به لیست دروس
    </button>`;
    const doneCount=grp.items.length-grp.pendingItems.length;
    const totalCount=grp.items.length;
    const pct2=totalCount>0?Math.round((doneCount/totalCount)*100):0;
    const barColor=isOverdueMode?'#f87171':(c?c.color:'var(--blue)');
    html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div style="display:flex;align-items:center;gap:8px;">
        ${c?`<span style="width:10px;height:10px;border-radius:50%;background:${c.color};display:inline-block;"></span><span style="font-size:17px;font-weight:700;color:var(--text);">${c.name}</span>`:'<span style="font-size:17px;font-weight:700;color:var(--text);">سایر</span>'}
        <span style="font-size:13px;color:var(--text3);">${toFa(grp.pendingItems.length)} موضوع باقی‌مانده</span>
        ${doneCount>0?`<span style="font-size:13px;color:var(--green);">✓ ${toFa(doneCount)} انجام شده</span>`:''}
      </div>
      <div style="display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <button onclick="reviewViewMode='tile';render()" title="نمایش کارتی" style="padding:6px 10px;border:none;background:${reviewViewMode==='tile'?'var(--bg4)':'transparent'};color:${reviewViewMode==='tile'?'var(--text)':'var(--text3)'};font-size:15px;cursor:pointer;transition:all 0.15s;">⊞</button>
        <button onclick="reviewViewMode='single';reviewSingleIdx=0;render()" title="نمایش تک‌موضوعی" style="padding:6px 10px;border:none;background:${reviewViewMode==='single'?'var(--bg4)':'transparent'};color:${reviewViewMode==='single'?'var(--text)':'var(--text3)'};font-size:15px;cursor:pointer;transition:all 0.15s;">▭</button>
      </div>
    </div>`;
    html+=`<div style="margin-bottom:14px;">
      <div style="height:5px;background:var(--bg4);border-radius:4px;overflow:hidden;">
        <div style="height:100%;width:${pct2}%;background:${barColor};border-radius:4px;transition:width 0.3s;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <span style="font-size:11px;color:var(--text3);">${doneCount===0?'شروع نشده':pct2===100?'✓ تکمیل شده':toFa(pct2)+'٪ انجام شده'}</span>
        <span style="font-size:11px;color:var(--text3);">${toFa(totalCount-doneCount)} باقی‌مانده از ${toFa(totalCount)}</span>
      </div>
    </div>`;

    // ── حالت تک‌موضوعی ──
    if(reviewViewMode==='single'){
      const pendingList=grp.pendingItems;
      if(reviewSingleIdx>=pendingList.length) reviewSingleIdx=Math.max(0,pendingList.length-1);
      const item=pendingList[reviewSingleIdx];
      const totalPending=pendingList.length;

      let singleCard='';
      if(item.type==='topic'){
        const t=item.t;
        const ch=getCh(t),diff=daysDiff(t.nextReview);
        const isOD=isOverdueMode||(t.nextReview<todayStr);
        const breadcrumb=[c?.name,ch?.name].filter(Boolean).join(' / ');
        singleCard=`<div class="card single-card-enter" style="${isOD?'border-right:3px solid #f8717155;background:#f8717106;':`border:1px solid ${c?c.color+'44':'var(--border2)'};`}">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:12px;color:var(--text3);">${breadcrumb}</span>
                <span style="font-size:12px;color:${diff<=0?'#fb923c':'var(--text3)'};">${diff===0?'امروز':diff<0?toFa(Math.abs(diff))+' روز تأخیر':toFa(diff)+' روز دیگر'}</span>
              </div>
              <div style="font-size:20px;font-weight:700;color:var(--text);margin-bottom:6px;line-height:1.4;">${t.name}</div>
              <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;">
                ${t.lastGrade?gb(t.lastGrade):''}
                ${t.importance?ib(t.importance):''}
              </div>
              ${trendChart(t.history)}
            </div>
          </div>
          ${gradingId===t.id?gradeRow(t.id):`<button data-grade-trigger="${t.id}" data-is-sub="0" onclick="gradingId='${t.id}';updateSingleCard()" style="margin-top:8px;width:100%;padding:12px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text2);font-size:17px;font-weight:600;">ثبت نمره</button>`}
          <div style="margin-top:8px;">
            <button onclick="toggleNote('sv-note-${t.id}')" style="font-size:13px;color:var(--text3);background:none;border:none;padding:2px 0;">
              <span style="text-decoration:underline;">${t.note?'نمایش یادداشت':'یادداشت'}</span>
            </button>
            <div id="sv-note-${t.id}" style="display:none;">
              <textarea class="note-ta" style="margin-top:6px;" placeholder="یادداشت..." onchange="saveNote('${t.id}',this.value)">${t.note??''}</textarea>
            </div>
          </div>
        </div>`;
      } else {
        const t=item.t,s=item.s;
        const ch=getCh(t),diff=daysDiff(s.nextReview);
        const isOD=isOverdueMode||(s.nextReview<todayStr);
        const sbreadcrumb=[c?.name,ch?.name,t.name].filter(Boolean).join(' / ');
        singleCard=`<div class="card single-card-enter" style="${isOD?'border-right:3px solid #f8717155;background:#f8717106;':`border:1px solid ${c?c.color+'44':'var(--border2)'};`}">
          <div style="display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;">
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
                <span style="font-size:12px;color:var(--text3);">${sbreadcrumb}</span>

function renderReviewCourseList(groups, isOverdueMode){
  const todayStr=today();
  const todayCount=todayOnlyItems().length;
  const overdueCount=overdueItems().length;

  // تب‌های امروز / عقب‌افتاده
  let html=`<div style="display:flex;align-items:center;border-bottom:1px solid var(--border);margin-bottom:14px;gap:6px;">
    <div style="display:flex;flex:1;">
    <button onclick="reviewMode='today';window._reviewSelectedCourse=null;render()" style="
      padding:8px 0;font-size:14px;font-weight:600;font-family:inherit;background:none;border:none;
      border-bottom:2px solid ${!isOverdueMode?'var(--blue)':'transparent'};
      color:${!isOverdueMode?'var(--text)':'var(--text3)'};cursor:pointer;flex:1;">
      مرور امروز <span style="background:${todayCount>0?'#facc15':'var(--bg4)'};color:${todayCount>0?'#0a0a0f':'var(--text3)'};border-radius:10px;padding:1px 6px;font-size:11px;margin-right:4px;">${toFa(todayCount)}</span>
    </button>
    <button onclick="reviewMode='overdue';window._reviewSelectedCourse=null;render()" style="
      padding:8px 0;font-size:14px;font-weight:600;font-family:inherit;background:none;border:none;
      border-bottom:2px solid ${isOverdueMode?'#f87171':'transparent'};
      color:${isOverdueMode?'var(--text)':'var(--text3)'};cursor:pointer;flex:1;">
      عقب‌افتاده‌ها <span style="background:${overdueCount>0?'#f87171':'var(--bg4)'};color:${overdueCount>0?'#fff':'var(--text3)'};border-radius:10px;padding:1px 6px;font-size:11px;margin-right:4px;">${toFa(overdueCount)}</span>
    </button>
    </div>
  </div>`;


  html+=`<div style="display:flex;flex-direction:column;gap:10px;">`;
  let hasAny=false;
  Object.values(groups).forEach(({c,items:gitems,pendingItems})=>{
    const total=gitems.length;
    const doneCount=total-(pendingItems||[]).length;
    const allDone=doneCount===total;
    if(allDone && !isOverdueMode) return;
    if(pendingItems.length===0) return;
    hasAny=true;
    const pct=Math.round((doneCount/total)*100);
    const key=c?c.id:'other';
    const color=c?c.color:'#888';

    html+=`<button onclick="window._reviewSelectedCourse='${key}';window._reviewNavFlag=false;render()" style="
      display:flex;flex-direction:column;gap:10px;padding:16px 18px;
      border-radius:12px;border:${isOverdueMode?'1px solid #f8717155':'1px solid var(--border)'};
      background:${isOverdueMode?'#f8717106':'var(--bg2)'};
      width:100%;text-align:right;cursor:pointer;transition:border-color 0.15s;font-family:inherit;
    " onmouseover="this.style.borderColor='${isOverdueMode?'#f8717199':'var(--border2)'}'" onmouseout="this.style.borderColor='${isOverdueMode?'#f8717155':'var(--border)'}'">
      <div style="display:flex;align-items:center;gap:12px;width:100%;">
        <span style="width:12px;height:12px;border-radius:50%;background:${color};flex-shrink:0;"></span>
        <span style="flex:1;font-size:16px;font-weight:600;color:var(--text);text-align:right;">${c?c.name:'سایر'}</span>
        <span style="font-size:13px;color:${isOverdueMode?'#f87171':'var(--text3)'};">${toFa(pendingItems.length)} موضوع${isOverdueMode?' عقب‌افتاده':''}</span>
        <span style="font-size:14px;color:${isOverdueMode?'#f87171':'var(--blue)'};">←</span>
      </div>
      <div style="width:100%;">
        <div style="height:5px;background:var(--bg4);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${isOverdueMode?'#f87171':color};border-radius:4px;transition:width 0.3s;"></div>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <span style="font-size:11px;color:var(--text3);">${doneCount===0?'شروع نشده':allDone?'✓ تکمیل شده':toFa(pct)+'٪ انجام شده'}</span>
          <span style="font-size:11px;color:var(--text3);">${toFa(total-doneCount)} باقی‌مانده</span>
        </div>
      </div>
    </button>`;
  });
  if(!hasAny){
    html+=`<div style="text-align:center;padding:40px 0;color:var(--text3);">
      ${isOverdueMode?'✅ هیچ موضوع عقب‌افتاده‌ای وجود ندارد':'✓ همه مرورهای امروز انجام شده!'}
    </div>`;
  }
  html+=`</div>`;
  return html;
}

function saveNote(id,val){D.topics=D.topics.map(t=>t.id===id?{...t,note:val,updatedAt:nowISO()}:t);sd();}
function saveSubNote(id,val){D.subtopics=D.subtopics.map(s=>s.id===id?{...s,note:val,updatedAt:nowISO()}:s);sd();}

function applyGrade(id,grade){
  const cfg=GC[grade];
  D.topics=D.topics.map(t=>t.id!==id?t:{...t,lastGrade:grade,nextReview:addDays(today(),cfg.days),history:[...t.history,{date:today(),grade}],updatedAt:nowISO()});
  gradingId=null;
  sd();render();flash('نمره ثبت شد','#4ade80');
}

// در حالت single، فقط بخش grade row داخل کارت رو update کن بدون کل render
function updateSingleCard(){
  const wrap=document.getElementById('single-card-wrap');
  if(!wrap){render();return;}
  // پیدا کردن grade-trigger که باید به gradeRow تبدیل بشه
  const gradeBtn=wrap.querySelector('[data-grade-trigger]');
  if(gradeBtn){
    const id=gradeBtn.getAttribute('data-grade-trigger');
    const isSubtopic=gradeBtn.getAttribute('data-is-sub')==='1';
    const gradeHtml=isSubtopic?subGradeRow(id):gradeRow(id);
    gradeBtn.outerHTML=gradeHtml;
  } else {
    render();
  }
}

// ── JALALI (SHAMSI) CALENDAR UTILS ───────────────────────────────────────────
const JD={
  toJalali(gy,gm,gd){
    let jy,jm,jd,g_d_no,j_d_no,i,j_np;
    const g_y=gy-1600,g_m=gm-1,g_d=gd-1;
    let g_d_no2=365*g_y+Math.floor((g_y+3)/4)-Math.floor((g_y+99)/100)+Math.floor((g_y+399)/400);
    for(i=0;i<g_m;++i)g_d_no2+=[31,28+((gy%4===0&&gy%100!==0)||(gy%400===0)?1:0),31,30,31,30,31,31,30,31,30,31][i];
    g_d_no2+=g_d;
    j_d_no=g_d_no2-79;
    j_np=Math.floor(j_d_no/12053);j_d_no%=12053;
    jy=979+33*j_np+4*Math.floor(j_d_no/1461);
    j_d_no%=1461;
    if(j_d_no>=366){jy+=Math.floor((j_d_no-1)/365);j_d_no=(j_d_no-1)%365;}
    for(i=0;i<11&&j_d_no>=[31,31,31,31,31,31,30,30,30,30,30][i];++i)j_d_no-=[31,31,31,31,31,31,30,30,30,30,30][i];
    jm=i+1;jd=j_d_no+1;
    return{jy,jm,jd};
  },
  toGregorian(jy,jm,jd){
    // الگوریتم صحیح تبدیل جلالی به میلادی
    const jy2=jy-979, jm2=jm-1, jd2=jd-1;
    let j_day_no=365*jy2+Math.floor(jy2/33)*8+Math.floor((jy2%33+3)/4);
    const jml=[31,31,31,31,31,31,30,30,30,30,30,29];
    for(let i=0;i<jm2;i++) j_day_no+=jml[i];
    j_day_no+=jd2;
    let g_day_no=j_day_no+79;
    let gy=1600+400*Math.floor(g_day_no/146097); g_day_no%=146097;
    let leap=true;
    if(g_day_no>=36525){
      g_day_no--;
      gy+=100*Math.floor(g_day_no/36524); g_day_no%=36524;
      if(g_day_no>=365) g_day_no++;
      else leap=false;
    }
    gy+=4*Math.floor(g_day_no/1461); g_day_no%=1461;
    if(g_day_no>=366){
      leap=false; g_day_no--;
      gy+=Math.floor(g_day_no/365); g_day_no%=365;
    }
    const gMonthLen=[31,leap?29:28,31,30,31,30,31,31,30,31,30,31];
    let gm=0;
    while(gm<12 && g_day_no>=gMonthLen[gm]) g_day_no-=gMonthLen[gm++];
    return{gy, gm:gm+1, gd:g_day_no+1};
  },
  daysInJMonth(jy,jm){
    if(jm<=6)return 31;
    if(jm<=11)return 30;
    return JD.isJLeap(jy)?30:29;
  },
  isJLeap(jy){
    return[1,5,9,13,17,22,26,30].includes(((jy-474)%2820+474+38)*682%2816);
  },
  todayJalali(){
    const now=new Date();
    return JD.toJalali(now.getFullYear(),now.getMonth()+1,now.getDate());
  },
  // gregorian YYYY-MM-DD → jalali {jy,jm,jd}
  gStrToJ(str){
    const[y,m,d]=str.split('-').map(Number);
    return JD.toJalali(y,m,d);
  },
  // jalali → gregorian YYYY-MM-DD
  jToGStr(jy,jm,jd){
    const{gy,gm,gd}=JD.toGregorian(jy,jm,jd);
    return`${gy}-${String(gm).padStart(2,'0')}-${String(gd).padStart(2,'0')}`;
  },
  // day of week for jalali date (0=شنبه ... 6=جمعه)
  jDayOfWeek(jy,jm,jd){
    const{gy,gm,gd}=JD.toGregorian(jy,jm,jd);
    const dow=new Date(gy,gm-1,gd).getDay(); // 0=Sun
    // convert to Iran week: Sat=0
    return(dow+1)%7; // Sat=0,Sun=1,...,Fri=6
  }
};

function _buildProgressCharts(){
  const isLight=document.body.classList.contains('light');
  const courses=activeItems(D.courses);
  const targetCourses=_progressCourse==='all'?courses:courses.filter(c=>c.id===_progressCourse);

  if(!targetCourses.length) return`<div style="text-align:center;color:var(--text3);padding:60px 0;">هیچ درسی وجود ندارد</div>`;

  // generate time buckets
  const buckets=_getTimeBuckets();
  if(!buckets.length) return`<div style="text-align:center;color:var(--text3);padding:60px 0;">اطلاعاتی برای نمایش وجود ندارد</div>`;

  let html='';
  targetCourses.forEach(course=>{
    // پیدا کردن همه chapters این درس
    const courseChIds=new Set(activeItems(D.chapters).filter(ch=>ch.courseId===course.id).map(ch=>ch.id));
    const topics=activeItems(D.topics).filter(t=>courseChIds.has(t.chapterId));
    const topicIds=new Set(topics.map(t=>t.id));
    const subtopics=activeItems(D.subtopics).filter(s=>topicIds.has(s.topicId));

    // compute avg readiness per bucket
    const points=buckets.map(bucket=>{
      // for each topic/subtopic, find the most recent history entry within this bucket
      let scores=[];
      topics.forEach(t=>{
        if(!t.history||!t.history.length) return;
        const inBucket=t.history.filter(h=>h.date>=bucket.start&&h.date<=bucket.end);
        if(inBucket.length){
          const last=inBucket[inBucket.length-1];
          const gc=GC[last.grade];
          if(gc) scores.push(gs(last.grade));
        }
      });
      subtopics.forEach(s=>{
        if(!s.history||!s.history.length) return;
        const inBucket=s.history.filter(h=>h.date>=bucket.start&&h.date<=bucket.end);
        if(inBucket.length){
          const last=inBucket[inBucket.length-1];
          const gc=GC[last.grade];
          if(gc) scores.push(gs(last.grade));
        }
      });
      const avg=scores.length?Math.round(scores.reduce((a,b)=>a+b,0)/scores.length):null;
      return{label:bucket.label,avg,jm:bucket.jm,jy:bucket.jy};
    });

    // SVG line chart
    const color=course.color||'#5b9ef5';
    const W=500,H=160,PL=32,PR=16,PT=20,PB=28;
    const iW=W-PL-PR,iH=H-PT-PB;
    const validPts=points.filter(p=>p.avg!==null);

    const xPos=i=>PL+i*(iW/(points.length-1||1));
    const yPos=v=>PT+iH-(v/100)*iH;
    const axisColor=isLight?'#c8c8c2':'#2a2a2a';
    const gridColor=isLight?'#e0e0da':'#1e1e1e';
    const labelColor=isLight?'#4a4a44':'#787878';

    // build path only through valid points
    let pathD='',fillD='';
    const connectedPts=points.map((p,i)=>({...p,x:xPos(i),y:p.avg!==null?yPos(p.avg):null})).filter(p=>p.y!==null);

    if(connectedPts.length>1){
      pathD=connectedPts.map((p,i)=>`${i===0?'M':'L'}${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
      fillD=`${pathD} L${connectedPts[connectedPts.length-1].x.toFixed(1)},${(PT+iH).toFixed(1)} L${connectedPts[0].x.toFixed(1)},${(PT+iH).toFixed(1)} Z`;
    }

    const gradId='pgFill'+course.id.replace(/[^a-z0-9]/gi,'');
    const clipId='pgClip'+course.id.replace(/[^a-z0-9]/gi,'');
    const last=connectedPts[connectedPts.length-1];

    // محاسبه گروه‌های ماهانه برای بک‌گراند (فقط در حالت روزانه و هفتگی)
    const J_MONTHS_FULL=['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];
    let monthBgHtml='';
    if(_progressMode==='daily'||_progressMode==='weekly'){
      // پیدا کردن مرزهای ماه در بین bucket ها
      const monthGroups=[];
      let curM=null,curStart=0;
      points.forEach((p,i)=>{
        const key=(p.jy||0)*100+(p.jm||0);
        if(key!==curM){
          if(curM!==null) monthGroups.push({jm:curM%100,startI:curStart,endI:i-1});
          curM=key;curStart=i;
        }
        if(i===points.length-1) monthGroups.push({jm:curM%100,startI:curStart,endI:i});
      });
      const monthBgColor=isLight?'rgba(0,0,0,0.03)':'rgba(255,255,255,0.03)';
      const monthLabelColor=isLight?'rgba(0,0,0,0.12)':'rgba(255,255,255,0.08)';
      monthBgHtml=monthGroups.map((mg,gi)=>{
        const x1=xPos(mg.startI);
        const x2=xPos(mg.endI);
        const midX=(x1+x2)/2;
        const mName=J_MONTHS_FULL[(mg.jm-1+12)%12]||'';
        const bgFill=gi%2===0?monthBgColor:'transparent';
        return`<rect x="${x1.toFixed(1)}" y="${PT}" width="${(x2-x1+iW/(points.length-1||1)*0.5).toFixed(1)}" height="${iH}" fill="${bgFill}" rx="0"/>
        <text x="${midX.toFixed(1)}" y="${(PT+iH/2+6).toFixed(1)}" font-size="18" fill="${monthLabelColor}" text-anchor="middle" font-family="Vazirmatn,sans-serif" font-weight="700">${mName}</text>`;
      }).join('');
    }

    html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;"></div>
        <div style="font-size:14px;font-weight:700;color:var(--text);">${course.name}</div>
        ${validPts.length?`<div style="margin-right:auto;font-size:12px;color:${color};font-weight:700;">${toFa(last?last.avg:0)}%</div>`:'<div style="margin-right:auto;font-size:12px;color:var(--text3);">داده‌ای ثبت نشده</div>'}
      </div>
      ${validPts.length<1?`<div style="text-align:center;color:var(--text3);font-size:13px;padding:24px 0;">برای این بازه هنوز مرور ثبت نشده</div>`:`
      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;display:block;direction:ltr;">
        <defs>
          <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
          </linearGradient>
          <clipPath id="${clipId}"><rect x="${PL}" y="${PT}" width="${iW}" height="${iH}"/></clipPath>
        </defs>
        ${monthBgHtml}
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+iH}" stroke="${axisColor}" stroke-width="1"/>
        <line x1="${PL}" y1="${PT+iH}" x2="${PL+iW}" y2="${PT+iH}" stroke="${axisColor}" stroke-width="1"/>
        ${[0,25,50,75,100].map(v=>{
          const y=yPos(v);
          return`<line x1="${PL}" y1="${y.toFixed(1)}" x2="${PL+iW}" y2="${y.toFixed(1)}" stroke="${gridColor}" stroke-width="0.8" stroke-dasharray="3,4"/>
          <text x="${(PL-4).toFixed(1)}" y="${(y+3).toFixed(1)}" font-size="8" fill="${labelColor}" text-anchor="end" font-family="Vazirmatn,sans-serif">${toFa(v)}</text>`;
        }).join('')}
        ${fillD?`<path d="${fillD}" fill="url(#${gradId})" clip-path="url(#${clipId})"/>`:''}
        ${connectedPts.length>1?`<path d="${pathD}" fill="none" stroke="${color}" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" clip-path="url(#${clipId})"/>`:''}
        ${connectedPts.map((p,i)=>{
          const isLast=i===connectedPts.length-1;
          return`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${isLast?4:2}" fill="${color}" stroke="var(--bg2)" stroke-width="${isLast?2:1}" opacity="${isLast?1:0.7}"/>`;
        }).join('')}
        ${points.map((p,i)=>{
          const x=xPos(i);
          const isFirst=i===0;
          const isLast=i===points.length-1;
          const showLabel=_progressMode==='daily'?true:(points.length<=8||(isFirst||isLast||(i%(Math.ceil(points.length/6))===0)));
          const labelFs=_progressMode==='daily'?6:8;
          return showLabel?`<text x="${x.toFixed(1)}" y="${H-2}" font-size="${labelFs}" fill="${labelColor}" text-anchor="middle" font-family="Vazirmatn,sans-serif">${p.label}</text>`:'';
        }).join('')}
      </svg>`}
    </div>`;
  });
  return html||`<div style="text-align:center;color:var(--text3);padding:60px 0;">داده‌ای برای نمایش وجود ندارد</div>`;
}

function _getTimeBuckets(){
  const todayJ=JD.todayJalali();
  const todayStr=today();
  const buckets=[];

  if(_progressMode==='daily'){
    // ۳۰ روز گذشته
    for(let i=29;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const gStr=d.toISOString().slice(0,10);
      const j=JD.toJalali(d.getFullYear(),d.getMonth()+1,d.getDate());
      buckets.push({start:gStr,end:gStr,label:toFa(j.jd),jm:j.jm,jy:j.jy,jd:j.jd});
    }
  } else if(_progressMode==='weekly'){
    // ۱۲ هفته گذشته
    for(let w=11;w>=0;w--){
      const wStart=new Date();wStart.setDate(wStart.getDate()-w*7-6);
      const wEnd=new Date();wEnd.setDate(wEnd.getDate()-w*7);
      const s=wStart.toISOString().slice(0,10);
      const e=wEnd.toISOString().slice(0,10);
      const jS=JD.toJalali(wStart.getFullYear(),wStart.getMonth()+1,wStart.getDate());
      const jE=JD.toJalali(wEnd.getFullYear(),wEnd.getMonth()+1,wEnd.getDate());
      buckets.push({start:s,end:e,label:toFa(jS.jd)+'/'+toFa(jS.jm),jm:jS.jm,jy:jS.jy,jd:jS.jd});
    }
  } else {
    // ۱۲ ماه گذشته
    for(let m=11;m>=0;m--){
      let jy=todayJ.jy,jm=todayJ.jm-m;
      while(jm<=0){jm+=12;jy--;}
      const daysInM=JD.daysInJMonth(jy,jm);
      const gStart=JD.jToGStr(jy,jm,1);
      const gEnd=JD.jToGStr(jy,jm,daysInM);
      const mNames=['فر','ار','خر','تیر','مر','شه','مه','آب','آذ','دی','به','اس'];
      buckets.push({start:gStart,end:gEnd,label:mNames[jm-1]});
    }
  }
  return buckets;
}
function renderCalendar(){
  if(!calendarJY)initCalendarMonth();

  // build study days map: gDate → [{name,color,grade}]
  const studyMap={};
  activeItems(D.topics).forEach(t=>{
    const crs=getCrs(t);
    t.history.forEach(h=>{
      if(!studyMap[h.date])studyMap[h.date]=[];
      studyMap[h.date].push({name:crs?crs.name:'',color:crs?crs.color:'#888',grade:h.grade});
    });
  });
  activeItems(D.subtopics||[]).forEach(s=>{
    const t=activeItems(D.topics).find(x=>x.id===s.topicId);
    const crs=t?getCrs(t):null;
    (s.history||[]).forEach(h=>{
      if(!studyMap[h.date])studyMap[h.date]=[];
      studyMap[h.date].push({name:crs?crs.name:'',color:crs?crs.color:'#888',grade:h.grade});
    });
  });

  // build due-per-day map: gDate → {total, done}
  // برای هر روز: چند تا آیتم برنامه داشته و چند تاش انجام شده
  // dueMap: برای هر روز، چه موضوعاتی باید مرور میشدن و چند تا انجام شده
  // منطق صحیح: هر موضوع/زیرموضوع دقیقاً یک nextReview دارد
  // اگه اون روز مرور شده => done, اگه نشده => undone
  // تاریخ‌های گذشته‌ی history هم نشون‌دهنده‌ی روزهایی هستند که اون روز scheduled بودند
  const dueMap={}; // gDate → {total:number, done:number}

  function scheduleDue(gDate, isDone){
    if(!dueMap[gDate]) dueMap[gDate]={total:0,done:0};
    dueMap[gDate].total++;
    if(isDone) dueMap[gDate].done++;
  }

  activeItems(D.topics).forEach(t=>{
    const subs=getSubtopics(t.id);
    if(subs.length){
      // اگه topic دارای subtopic است، خودش در dueMap شمرده نمی‌شه — فقط subtopicها
      // history topic هم نادیده گرفته می‌شه چون مرور اصلی روی subtopic است
    } else {
      // هر entry در history یعنی اون روز scheduled بود و انجام شد
      (t.history||[]).forEach(h=>scheduleDue(h.date, true));
      // nextReview فعلی اگه هنوز انجام نشده (در history نیست)
      const doneDates=new Set((t.history||[]).map(h=>h.date));
      if(t.nextReview && !doneDates.has(t.nextReview)){
        scheduleDue(t.nextReview, false);
      }
    }
  });
  (activeItems(D.subtopics)||[]).forEach(s=>{
    (s.history||[]).forEach(h=>scheduleDue(h.date, true));
    const doneDates=new Set((s.history||[]).map(h=>h.date));
    if(s.nextReview && !doneDates.has(s.nextReview)){
      scheduleDue(s.nextReview, false);
    }
  });

  const daysInMonth=JD.daysInJMonth(calendarJY,calendarJM);
  const firstDow=JD.jDayOfWeek(calendarJY,calendarJM,1);
  const todayJ=JD.todayJalali();
  const todayStr=today();

  const streak=getStudyStreak();
  const streakLevel=getStreakLevel(streak);
  // هر لول با رسیدن به عدد exact فعال میشه
  const levels=[
    {exact:2,  min:2,  max:3,  icon:'🌱', label:'تازه‌کار'},
    {exact:4,  min:4,  max:5,  icon:'🔸', label:'هنوز ثابت نشدی'},
    {exact:6,  min:6,  max:7,  icon:'⚡', label:'شاید این دفعه ادامه بدی'},
    {exact:8,  min:8,  max:9,  icon:'🔥', label:'به نظر واقعی میاد'},
    {exact:10, min:10, max:29, icon:'👑', label:'تبریک میگم'},
    {exact:30, min:30, max:999,icon:'🏆', label:'قهرمان'},
  ];
  const currentLevelIdx=levels.findIndex(l=>streak>=l.min&&streak<=l.max);

  // محاسبه اطلاعات لول بعدی برای progress bar
  const nextLevelIdx = currentLevelIdx >= 0 ? currentLevelIdx + 1 : -1;
  const nextLevel = nextLevelIdx < levels.length ? levels[nextLevelIdx] : null;
  const currentLevel = currentLevelIdx >= 0 ? levels[currentLevelIdx] : null;
  const prevLevelMin = currentLevel ? currentLevel.exact : 0;
  const progressPct = nextLevel && currentLevel
    ? Math.min(100, Math.round(((streak - prevLevelMin) / (nextLevel.exact - prevLevelMin)) * 100))
    : streak >= 30 ? 100
    : !currentLevel && streak > 0
      ? Math.min(100, Math.round((streak / 2) * 100)) // قبل از اولین لول
      : 0;
  const streakBarLabel = currentLevel ? currentLevel.label : 'هنوز لولی نداری';
  const streakBarIcon  = currentLevel ? currentLevel.icon  : '💤';
  const streakBarNext  = nextLevel
    ? `${toFa(nextLevel.exact - streak)} روز تا ${nextLevel.icon} ${nextLevel.label}`
    : (streak>=30 ? 'به بالاترین لول رسیدی 🏆' : '۲ روز متوالی بخون');

  let html=`<div class="cal-layout">`;

  // ── STREAK BAR (بالا، همیشه نمایش داده میشه) ──
  html+=`<div class="cal-right">
    <button onclick="showLevelsModal()" style="display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 12px;width:100%;cursor:pointer;transition:border-color 0.15s;font-family:inherit;box-sizing:border-box;" onmouseover="this.style.borderColor='var(--border2)'" onmouseout="this.style.borderColor='var(--border)'">
      <div style="font-size:18px;line-height:1;flex-shrink:0;">${streakBarIcon}</div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;color:var(--text);">${streak>0?toFa(streak)+' روز متوالی — ':''}${streakBarLabel}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:1px;">${streakBarNext}</div>
        <div style="height:3px;background:var(--bg4);border-radius:3px;overflow:hidden;margin-top:4px;"><div style="height:100%;border-radius:3px;background:var(--blue);width:${progressPct}%;transition:width 0.3s;"></div></div>
      </div>
      <div style="font-size:12px;color:var(--text3);flex-shrink:0;">‹</div>
    </button>
  </div>`;

  // ── CALENDAR ──
  html+=`<div class="cal-center" style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;box-sizing:border-box;">`; 

  // header nav
  html+=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <button onclick="calNext()" style="width:28px;height:28px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;">‹</button>
    <div style="text-align:center;">
      <div style="font-size:14px;font-weight:700;color:var(--text);">${J_MONTHS[calendarJM-1]}</div>
      <div style="font-size:11px;color:var(--text3);">${toFa(calendarJY)}</div>
    </div>
    <button onclick="calPrev()" style="width:28px;height:28px;border-radius:7px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:14px;">›</button>
  </div>`;

  // day headers

    if(subs.length) return; // topic با subtopic: خودش شمرده نمی‌شه
    const isScheduled=t.nextReview===gStr;
    const wasDone=(t.history||[]).some(h=>h.date===gStr);
    if(isScheduled||wasDone){
      const crs=getCrs(t);
      dueItems.push({id:'t-'+t.id,name:t.name,crsId:crs?crs.id:'',crsName:crs?crs.name:'بدون درس',crsColor:crs?crs.color:'#888',done:wasDone});

  (activeItems(D.subtopics)||[]).forEach(s=>{
    const isScheduled=s.nextReview===gStr;

    const subs=getSubtopics(t.id);
    if(subs.length){
      subs.forEach(s=>{

          const crs=getCrs(t);

          display:flex;align-items:center;gap:10px;padding:12px 14px;

          <span style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;"></span>
