// ── STUDY STATS WIDGET ────────────────────────────────────────────────────────
function getScheduledDates(){
  // مجموعه روزهایی که تو تقویم برنامه دارن (nextReview یا history)
  const scheduled=new Set();
  activeItems(D.topics).forEach(t=>{
    (t.history||[]).forEach(h=>scheduled.add(h.date));
    if(t.nextReview) scheduled.add(t.nextReview);
  });
  activeItems(D.subtopics||[]).forEach(s=>{
    (s.history||[]).forEach(h=>scheduled.add(h.date));
    if(s.nextReview) scheduled.add(s.nextReview);
  });
  return scheduled;
}

function getStudyStreak(){
  // ساخت dayMap: برای هر روز چند تا برنامه بود و چند تا انجام شد
  const dayMap={};
  function addDay(gDate, isDone){
    if(!dayMap[gDate]) dayMap[gDate]={total:0,done:0};
    dayMap[gDate].total++;
    if(isDone) dayMap[gDate].done++;
  }
  activeItems(D.topics).forEach(t=>{
    const subs=getSubtopics(t.id);
    if(subs.length) return; // topic با subtopic: خودش شمرده نمی‌شه
    const doneDates=new Set((t.history||[]).map(h=>h.date));
    doneDates.forEach(date=>addDay(date,true));
    if(t.nextReview && !doneDates.has(t.nextReview)) addDay(t.nextReview,false);
  });
  activeItems(D.subtopics||[]).forEach(s=>{
    const doneDates=new Set((s.history||[]).map(h=>h.date));
    doneDates.forEach(date=>addDay(date,true));
    if(s.nextReview && !doneDates.has(s.nextReview)) addDay(s.nextReview,false);
  });

  const todayStr=today();
  let streak=0;
  let cur=new Date(todayStr+'T00:00:00Z');

  for(let i=0;i<365;i++){
    const str=cur.toISOString().split('T')[0];
    const entry=dayMap[str];

    if(!entry){
      // روز بدون برنامه
      if(str===todayStr){
        // امروز هنوز برنامه نخوندیم — رد کن، streak نشکن
        cur.setUTCDate(cur.getUTCDate()-1);
        continue;
      }
      // روز گذشته بدون برنامه → streak قطع میشه
      break;
    }

    const isComplete=(entry.done===entry.total);

    if(isComplete){
      // روز کامل ✅
      streak++;
    } else if(str===todayStr){
      // امروز هنوز ناقصه — صبر کن، streak رو نشکن
    } else {
      // روز گذشته با برنامه ناقص — streak شکست
      break;
    }
    cur.setUTCDate(cur.getUTCDate()-1);
  }
  return streak;
}

function getStreakLevel(streak){
  if(streak>=30) return 'قهرمان';
  if(streak>=10) return 'تبریک میگم';
  if(streak>=8)  return 'به نظر واقعی میاد';
  if(streak>=6)  return 'شاید این دفعه ادامه بدی';
  if(streak>=4)  return 'هنوز ثابت نشدی';
  if(streak>=2)  return 'تازه‌کار';
  return '';
}

function getTodayStudyCount(){

  let count=0;
  activeItems(D.topics).forEach(x=>x.history.forEach(h=>{if(h.date===t)count++;}));
  activeItems(D.subtopics||[]).forEach(s=>(s.history||[]).forEach(h=>{if(h.date===t)count++;}));
  return count;
}

function getWeekStudyDays(){
  const dates=new Set();
  activeItems(D.topics).forEach(t=>t.history.forEach(h=>dates.add(h.date)));
  activeItems(D.subtopics||[]).forEach(s=>(s.history||[]).forEach(h=>dates.add(h.date)));
  let count=0;
  const base=new Date(today()+'T00:00:00Z');
  for(let i=0;i<7;i++){
    const d=new Date(base);d.setUTCDate(d.getUTCDate()-i);
    if(dates.has(d.toISOString().split('T')[0]))count++;
  }
  return count;
}

function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const p=JSON.parse(ev.target.result);
      if(p.courses&&p.topics){
        if(!p.subtopics)p.subtopics=[];
        // Merge imported data with current data using smart merge
        D.courses=mergeArray(D.courses, p.courses);
        D.chapters=mergeArray(D.chapters, p.chapters||[]);
        D.topics=mergeArray(D.topics, p.topics);
        D.subtopics=mergeArray(D.subtopics||[], p.subtopics);
        sd();render();flash('داده‌ها بازیابی شدن');
      } else flash('فایل معتبر نیست','#f87171');
    }catch{flash('خطا در خواندن فایل','#f87171');}
  };
  r.readAsText(f);e.target.value='';
}

// ── TRASH (RECYCLE BIN) ───────────────────────────────────────────────────────
function renderTrash(){
  const deletedCourses=D.courses.filter(x=>x._deleted);
  const deletedChapters=D.chapters.filter(x=>x._deleted);
  const deletedTopics=D.topics.filter(x=>x._deleted);
  const deletedSubs=(D.subtopics||[]).filter(x=>x._deleted);
  const total=deletedCourses.length+deletedChapters.length+deletedTopics.length+deletedSubs.length;

  const timeAgo=(iso)=>{
    if(!iso)return'';
    const diff=Math.round((Date.now()-new Date(iso).getTime())/60000);
    if(diff<60)return toFa(diff)+' دقیقه پیش';
    if(diff<1440)return toFa(Math.round(diff/60))+' ساعت پیش';
    return toFa(Math.round(diff/1440))+' روز پیش';
  };

  const itemRow=(item,type,label)=>{
    const parentInfo=type==='chapter'
      ?(()=>{const c=D.courses.find(x=>x.id===item.courseId);return c?` — ${c.name}`:''})()
      :type==='topic'
      ?(()=>{const ch=D.chapters.find(x=>x.id===item.chapterId);const c=ch?D.courses.find(x=>x.id===ch.courseId):null;return ch?` — ${c?c.name+' / ':''}${ch.name}`:''})()
      :type==='subtopic'
      ?(()=>{const t=D.topics.find(x=>x.id===item.topicId);return t?` — ${t.name}`:''})()
      :'';
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-size:15px;color:var(--text);font-weight:500;">${item.name}</div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">${label}${parentInfo} · ${timeAgo(item.updatedAt)}</div>
      </div>
      <button onclick="restoreItem('${type}','${item.id}')" style="padding:6px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;font-size:14px;color:var(--green);flex-shrink:0;">↩ بازگردانی</button>
      <button onclick="permanentDelete('${type}','${item.id}')" style="padding:6px 10px;background:#f8717118;border:1px solid #f87171;border-radius:8px;font-size:14px;color:#f87171;flex-shrink:0;">✕</button>
    </div>`;
  };

  let html=`<div>`;

  if(total===0){
    html+=`<div style="text-align:center;padding:60px 20px;color:var(--text3);">
      <div style="font-size:48px;margin-bottom:12px;">🗑</div>
      <div style="font-size:16px;">سطل زباله خالیه</div>
    </div>`;
  } else {
    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <span style="font-size:14px;color:var(--text3);">${toFa(total)} آیتم حذف‌شده</span>
      <button onclick="emptyTrash()" style="padding:7px 14px;background:#f8717118;border:1px solid #f87171;border-radius:8px;font-size:14px;color:#f87171;">پاک کردن همه</button>
    </div>`;

    if(deletedCourses.length){
      html+=`<div style="font-size:13px;font-weight:600;color:var(--text3);margin:12px 0 4px;">دروس</div><div class="card" style="padding:0 14px;">`;
      deletedCourses.forEach(x=>html+=itemRow(x,'course','درس'));
      html+=`</div>`;
    }
    if(deletedChapters.length){
      html+=`<div style="font-size:13px;font-weight:600;color:var(--text3);margin:12px 0 4px;">سرفصل‌ها</div><div class="card" style="padding:0 14px;">`;
      deletedChapters.forEach(x=>html+=itemRow(x,'chapter','سرفصل'));
      html+=`</div>`;
    }
    if(deletedTopics.length){
      html+=`<div style="font-size:13px;font-weight:600;color:var(--text3);margin:12px 0 4px;">موضوع‌ها</div><div class="card" style="padding:0 14px;">`;
      deletedTopics.forEach(x=>html+=itemRow(x,'topic','موضوع'));
      html+=`</div>`;
    }
    if(deletedSubs.length){
      html+=`<div style="font-size:13px;font-weight:600;color:var(--text3);margin:12px 0 4px;">زیرموضوع‌ها</div><div class="card" style="padding:0 14px;">`;
      deletedSubs.forEach(x=>html+=itemRow(x,'subtopic','زیرموضوع'));
      html+=`</div>`;
    }
  }

  html+=`</div>`;
  return html;
}

function restoreItem(type,id){
  const now=nowISO();
  if(type==='course'){
    // restore course + its chapters + their topics + subtopics
    const chs=D.chapters.filter(c=>c.courseId===id&&c._deleted);
    const chIds=chs.map(c=>c.id);
    const topIds=D.topics.filter(t=>chIds.includes(t.chapterId)&&t._deleted).map(t=>t.id);
    D.courses=D.courses.map(c=>c.id===id?{...c,_deleted:false,updatedAt:now}:c);
    D.chapters=D.chapters.map(c=>chIds.includes(c.id)?{...c,_deleted:false,updatedAt:now}:c);
    D.topics=D.topics.map(t=>topIds.includes(t.id)?{...t,_deleted:false,updatedAt:now}:t);
    D.subtopics=(D.subtopics||[]).map(s=>topIds.includes(s.topicId)?{...s,_deleted:false,updatedAt:now}:s);
  } else if(type==='chapter'){
    const topIds=D.topics.filter(t=>t.chapterId===id&&t._deleted).map(t=>t.id);
    D.chapters=D.chapters.map(c=>c.id===id?{...c,_deleted:false,updatedAt:now}:c);
    D.topics=D.topics.map(t=>topIds.includes(t.id)?{...t,_deleted:false,updatedAt:now}:t);
    D.subtopics=(D.subtopics||[]).map(s=>topIds.includes(s.topicId)?{...s,_deleted:false,updatedAt:now}:s);
  } else if(type==='topic'){
    D.topics=D.topics.map(t=>t.id===id?{...t,_deleted:false,updatedAt:now}:t);
    D.subtopics=(D.subtopics||[]).map(s=>s.topicId===id&&s._deleted?{...s,_deleted:false,updatedAt:now}:s);
  } else if(type==='subtopic'){
    D.subtopics=(D.subtopics||[]).map(s=>s.id===id?{...s,_deleted:false,updatedAt:now}:s);
  }
  sd();render();flash('بازگردانی شد ✓','#3dd68c');
}

function permanentDelete(type,id){
  if(type==='course'){
    const chIds=D.chapters.filter(c=>c.courseId===id).map(c=>c.id);
    const topIds=D.topics.filter(t=>chIds.includes(t.chapterId)).map(t=>t.id);
    D.courses=D.courses.filter(c=>c.id!==id);
    D.chapters=D.chapters.filter(c=>!chIds.includes(c.id));
    D.topics=D.topics.filter(t=>!topIds.includes(t.id));
    D.subtopics=(D.subtopics||[]).filter(s=>!topIds.includes(s.topicId));
  } else if(type==='chapter'){
    const topIds=D.topics.filter(t=>t.chapterId===id).map(t=>t.id);
    D.chapters=D.chapters.filter(c=>c.id!==id);
    D.topics=D.topics.filter(t=>t.chapterId!==id);
    D.subtopics=(D.subtopics||[]).filter(s=>!topIds.includes(s.topicId));
  } else if(type==='topic'){
    D.topics=D.topics.filter(t=>t.id!==id);
    D.subtopics=(D.subtopics||[]).filter(s=>s.topicId!==id);
  } else if(type==='subtopic'){
    D.subtopics=(D.subtopics||[]).filter(s=>s.id!==id);
  }
  sd();render();flash('حذف دائمی شد','#f87171');
}

function emptyTrash(){
  D.courses=D.courses.filter(x=>!x._deleted);
  D.chapters=D.chapters.filter(x=>!x._deleted);
  D.topics=D.topics.filter(x=>!x._deleted);
  D.subtopics=(D.subtopics||[]).filter(x=>!x._deleted);
  sd();render();flash('سطل زباله خالی شد');
}

function reorderChapter(cId,fromId,toId){
  if(fromId===toId)return;
  const chs=activeItems(D.chapters).filter(c=>c.courseId===cId);
  const deleted=D.chapters.filter(c=>c._deleted&&c.courseId===cId);
  const others=D.chapters.filter(c=>c.courseId!==cId);
  const fi=chs.findIndex(c=>c.id===fromId);
  const ti=chs.findIndex(c=>c.id===toId);
  if(fi<0||ti<0)return;
  const moved=chs.splice(fi,1)[0];
  chs.splice(ti,0,moved);
  D.chapters=[...others,...chs,...deleted];
  sd();render();
}
function reorderTopic(chId,fromId,toId){
  if(fromId===toId)return;

  const fi=tops.findIndex(t=>t.id===fromId);
  const ti=tops.findIndex(t=>t.id===toId);

  const moved=tops.splice(fi,1)[0];

  D.topics=[...others,...tops,...deleted];

}

function tokenize(str){return str.toLowerCase().trim().split(/\s+/).filter(Boolean);}
function fuzzyMatch(name,q){
  if(!q)return true;
  const tokens=tokenize(q);
  const n=name.toLowerCase();
  return tokens.every(tok=>n.includes(tok));
}
function doSearch(){
  const q=(document.getElementById('sq')?.value??'').trim();
  const cId=document.getElementById('sf-course')?.value??'';
  const grade=document.getElementById('sf-grade')?.value??'';
  const imp=document.getElementById('sf-imp')?.value??'';
  const el=document.getElementById('s-results');if(!el)return;
  if(!q&&!cId&&!grade&&!imp){el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--text3);font-size:17px;">برای جستجو تایپ کن...</div>`;return;}
  let res=activeItems(D.topics).filter(t=>{
    if(q&&!fuzzyMatch(t.name,q))return false;
    if(grade&&t.lastGrade!==grade)return false;
    if(imp&&t.importance!==imp)return false;
    if(cId){const c=getCrs(t);if(!c||c.id!==cId)return false;}
    return true;
  });
  if(!res.length){el.innerHTML=`<div style="text-align:center;padding:24px;color:var(--text3);font-size:17px;">نتیجه‌ای یافت نشد</div>`;return;}
  el.innerHTML=res.slice(0,15).map(t=>{
    const c=getCrs(t),ch=getCh(t);
    const diff=daysDiff(t.nextReview);
    return`<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border-radius:8px;margin-bottom:6px;cursor:pointer;" onclick="closeSearch();scrollToTopic('${t.id}')">
      ${gb(t.lastGrade)}
      <div style="flex:1;min-width:0;">
        <div style="font-size:17px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${t.name}</div>
        <div style="font-size:13px;color:var(--text3);margin-top:2px;">${c?c.name:''} ${ch?'/ '+ch.name:''}</div>
      </div>
      ${t.importance?ib(t.importance):''}
      <span style="font-size:13px;color:${diff<=0?'#fb923c':'var(--text3)'};flex-shrink:0;">${diff===0?'امروز':diff<0?toFa(Math.abs(diff))+'روز تأخیر':toFa(diff)+'روز دیگر'}</span>
    </div>`;
  }).join('');
}

// ── TREND CHART ───────────────────────────────────────────────────────────────
function trendChart(history){
  if(history.length<2)return'';
  const last8=history.slice(-8);
  const w=180,h=40,pad=4;
  const scores=last8.map(h=>gs(h.grade));
  const min=0,max=100;
  const pts=scores.map((s,i)=>{
    const x=pad+i*(w-pad*2)/(last8.length-1);
    const y=h-pad-(s-min)/(max-min)*(h-pad*2);
    return`${x},${y}`;
  }).join(' ');
  const lt=document.body.classList.contains('light');
  function cc(s){return s>=80?(lt?'#15803d':'#4ade80'):s>=60?(lt?'#4d7c0f':'#a3e635'):s>=40?(lt?'#a16207':'#facc15'):s>=20?(lt?'#c2410c':'#fb923c'):(lt?'#b91c1c':'#f87171');}
  const color=cc(scores[scores.length-1]);
  return`<svg width="${w}" height="${h}" style="display:block;margin-top:6px;">
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.7"/>
    ${scores.map((s,i)=>{
      const x=pad+i*(w-pad*2)/(last8.length-1);
      const y=h-pad-(s-min)/(max-min)*(h-pad*2);
      return`<circle cx="${x}" cy="${y}" r="2.5" fill="${cc(s)}"/>`;
    }).join('')}
  </svg>`;
}


// ── CHAPTER DRAG & DROP ───────────────────────────────────────────────────────
let dragOverChId=null;
let touchDragChId=null;
let touchDragCId=null;
let touchClone=null;
let touchStartY=0;

function onChDragStart(e,chId){
  dragSrcChId=chId;
  e.dataTransfer.effectAllowed='move';
  e.target.style.opacity='0.4';
}
function onChDragOver(e,chId,cId){
  e.preventDefault();
  e.dataTransfer.dropEffect='move';
  if(dragOverChId===chId)return;
  dragOverChId=chId;
  document.querySelectorAll('.ch-drag-item').forEach(el=>{
    el.style.borderColor=el.dataset.chid===chId?'var(--blue)':'var(--border)';
  });
}
function onChDragEnd(e,cId){
  e.target.style.opacity='1';
  if(dragOverChId&&dragSrcChId&&dragOverChId!==dragSrcChId){
    reorderChapter(cId,dragSrcChId,dragOverChId);
  }
  dragSrcChId=null;dragOverChId=null;
  document.querySelectorAll('.ch-drag-item').forEach(el=>el.style.borderColor='var(--border)');
}

// Touch support
function onChTouchStart(e,chId,cId){
  touchDragChId=chId;
  touchDragCId=cId;
  touchStartY=e.touches[0].clientY;
  const el=e.currentTarget;
  touchClone=el.cloneNode(true);
  touchClone.style.cssText=`position:fixed;left:${el.getBoundingClientRect().left}px;top:${el.getBoundingClientRect().top}px;width:${el.offsetWidth}px;opacity:0.85;z-index:9999;pointer-events:none;background:var(--bg3);border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,0.4);`;
  document.body.appendChild(touchClone);
  el.style.opacity='0.3';
}
function onChTouchMove(e){
  if(!touchClone)return;
  e.preventDefault();
  const dy=e.touches[0].clientY-touchStartY;
  const rect=touchClone.getBoundingClientRect();
  touchClone.style.top=(rect.top+dy)+'px';
  touchStartY=e.touches[0].clientY;
  // find what we're hovering over
  touchClone.style.display='none';
  const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY);
  touchClone.style.display='';
  const item=el?.closest('.ch-drag-item');
  document.querySelectorAll('.ch-drag-item').forEach(x=>x.style.borderColor='var(--border)');
  if(item&&item.dataset.chid!==touchDragChId){
    item.style.borderColor='var(--blue)';
    dragOverChId=item.dataset.chid;
  }
}
function onChTouchEnd(e,cId){
  if(touchClone){touchClone.remove();touchClone=null;}
  document.querySelectorAll('.ch-drag-item').forEach(el=>{
    el.style.opacity='1';el.style.borderColor='var(--border)';
  });
  if(dragOverChId&&touchDragChId&&dragOverChId!==touchDragChId){
    reorderChapter(cId,touchDragChId,dragOverChId);
  }
  touchDragChId=null;touchDragCId=null;dragOverChId=null;
}

// ── TIMER / STOPWATCH — با سینک cross-device ─────────────────────────────────
// معماری: هر بار که کاربر Stop می‌زند، وضعیت (seconds + startedAt) در cloud ذخیره می‌شود.
// وقتی روی دستگاه دیگر باز می‌شود، syncFromCloud این مقادیر را می‌خواند.
// اگر زمان‌سنج Running بود و startedAt داشت، از آن محاسبه می‌کنیم که چقدر گذشته.

let timerInterval=null, timerSeconds=0, timerRunning=false, timerMode='custom', timerStyle='digital';
let timerType='timer';
let timerLockedMode=null;
let stopwatchSeconds=0, stopwatchRunning=false, stopwatchInterval=null;

const TIMER_MODES={
  custom:{label:'تایمر',seconds:25*60,color:'#f06b6b'},
};

// ── بازیابی وضعیت Running از cloud ──────────────────────────────────────────
// این تابع را بعد از syncFromCloud صدا می‌زنیم
function restoreRunningState(){
  // کرنومتر: اگر D.swRunning و D.swStartedAt وجود داشت، از سر بگیر
  if(D.swRunning && D.swStartedAt){
    const elapsed=Math.floor((Date.now()-new Date(D.swStartedAt).getTime())/1000);
    stopwatchSeconds=(D.swSeconds||0)+elapsed;
    D.swRunning=false; // این دستگاه از سر می‌گیرد — state را reset می‌کنیم
    D.swStartedAt=null;
    // نمایش بدون start — کاربر باید دستی شروع کند
    if(page==='timer') render();
    showToast('کرنومتر از '+_fmtSw(stopwatchSeconds)+' ادامه پیدا می‌کنه ▶','info');
  }
  // تایمر: اگر D.timerRunning و D.timerStartedAt داشت
  if(D.timerRunning && D.timerStartedAt){
    const elapsed=Math.floor((Date.now()-new Date(D.timerStartedAt).getTime())/1000);
    const remaining=Math.max(0,(D.timerSeconds||0)-elapsed);
    timerSeconds=remaining;
    D.timerRunning=false;
    D.timerStartedAt=null;
    TIMER_MODES.custom.seconds=D.timerTotal||TIMER_MODES.custom.seconds;
    if(page==='timer'){render();initTimer();}
    if(remaining>0) showToast('تایمر '+_fmtTimer(remaining)+' مانده — ادامه بده ▶','info');
  }
}

function _fmtSw(s){
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
}
function _fmtTimer(s){
  const m=Math.floor(s/60),sec=s%60;
  return`${m}:${String(sec).padStart(2,'0')}`;
}

function setTimerType(type){
  timerType=type;
  render();
  if(timerType==='timer') initTimer();
}

function initTimer(){
  renderTimerDisplay();
  updateTimerStats();
}

function renderTimerDisplay(){
  const el=document.getElementById('timer-display');
  if(!el)return;
  const total=TIMER_MODES[timerMode].seconds;
  const remaining=timerSeconds>0?timerSeconds:total;
  const color=TIMER_MODES[timerMode].color;
  const pct=remaining/total;
  const m=Math.floor(remaining/60), s=remaining%60;
  const mStr=String(m).padStart(2,'0'), sStr=String(s).padStart(2,'0');
  const timeStr=`${toFa(parseInt(mStr[0]))}${toFa(parseInt(mStr[1]))}:${toFa(parseInt(sStr[0]))}${toFa(parseInt(sStr[1]))}`;
  if(timerStyle==='digital'){
    el.innerHTML=`<div style="text-align:center;padding:20px 0;">
      <div style="font-size:72px;font-weight:700;letter-spacing:4px;color:var(--text);font-variant-numeric:tabular-nums;">${timeStr}</div>
    </div>`;
  } else if(timerStyle==='clock'){
    const angle=(1-pct)*360;
    const r=90, cx=110, cy=110;
    const rad=(angle-90)*Math.PI/180;
    const x=cx+r*Math.cos(rad), y=cy+r*Math.sin(rad);
    const large=angle>180?1:0;
    el.innerHTML=`<div style="display:flex;justify-content:center;padding:10px 0;">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="var(--border)" stroke-width="12"/>
        <path d="M ${cx} ${cy-r} A ${r} ${r} 0 ${large} 1 ${x.toFixed(2)} ${y.toFixed(2)}" fill="none" stroke="${color}" stroke-width="12" stroke-linecap="round"/>
        <text x="${cx}" y="${cy+8}" text-anchor="middle" font-size="28" font-weight="700" fill="var(--text)" font-family="Vazirmatn,sans-serif">${timeStr}</text>
      </svg>
    </div>`;
  } else if(timerStyle==='bar'){
    el.innerHTML=`<div style="padding:20px 0;">
      <div style="text-align:center;font-size:48px;font-weight:700;color:var(--text);margin-bottom:20px;">${timeStr}</div>
      <div style="height:16px;background:var(--bg3);border-radius:8px;overflow:hidden;border:1px solid var(--border);">
        <div style="height:100%;width:${(pct*100).toFixed(1)}%;background:${color};border-radius:8px;transition:width 1s linear;"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:6px;font-size:12px;color:var(--text3);">
        <span>${toFa(Math.floor(total/60))} دقیقه</span>
        <span>${toFa(Math.round(pct*100))}٪ مانده</span>
      </div>
    </div>`;
  }
}

function setTimerMode(mode){
  timerMode='custom';
  if(timerRunning) timerStop();
  timerSeconds=0;
  render();
}

function setTimerStyle(style){
  timerStyle=style;
  renderTimerDisplay();
  [['digital'],['clock'],['bar']].forEach(([k])=>{
    const btns=document.querySelectorAll(`[onclick="setTimerStyle('${k}')"]`);
    btns.forEach(b=>{
      b.style.borderColor=k===style?'var(--text)':'var(--border)';
      b.style.background=k===style?'var(--bg4)':'var(--bg2)';
      b.style.color='var(--text)';
    });
  });
}

function updateCustomTime(){
  const min=parseInt(document.getElementById('custom-min')?.value)||25;
  TIMER_MODES.custom.seconds=min*60;
  if(!timerRunning) timerSeconds=0;
  renderTimerDisplay();
}

function timerToggle(){
  if(timerRunning) timerStop();
  else timerStart();
}

function timerStart(){
  if(timerSeconds===0) timerSeconds=TIMER_MODES[timerMode].seconds;
  timerLockedMode=timerMode;
  timerRunning=true;
  // ذخیره startedAt برای سینک cross-device
  D.timerRunning=true;
  D.timerStartedAt=new Date().toISOString();
  D.timerSeconds=timerSeconds; // زمان باقی‌مانده موقع شروع
  D.timerTotal=TIMER_MODES[timerMode].seconds;
  persistTimers();
  const btn=document.getElementById('timer-btn');
  if(btn){btn.textContent='⏸ توقف';btn.style.background='var(--bg3)';btn.style.border='1px solid var(--border)';btn.style.color='var(--text2)';}
  timerInterval=setInterval(()=>{
    timerSeconds--;
    if(timerSeconds<=0){
      timerSeconds=0;
      timerStop();
      const key='timer-today-'+new Date().toISOString().split('T')[0];
      const done=TIMER_MODES[timerLockedMode||timerMode].seconds;
      const prev=parseInt(localStorage.getItem(key)||'0');
      localStorage.setItem(key,prev+done);
      updateTimerStats();
      showToast('تایمر تموم شد! 🎉','success');
      return;
    }
    renderTimerDisplay();
    renderGlobalTimerBar();
  },1000);
  renderGlobalTimerBar();
}

function timerStop(){
  if(!timerRunning) return;
  timerRunning=false;
  clearInterval(timerInterval);
  timerInterval=null;
  D.timerSeconds=timerSeconds;
  D.timerMode=timerMode;
  D.timerRunning=false;
  D.timerStartedAt=null;
  persistTimers();
  const btn=document.getElementById('timer-btn');
  if(btn){btn.textContent='▶ ادامه';btn.style.background='var(--charcoal2)';btn.style.border='none';btn.style.color='#fff';}
  renderGlobalTimerBar();
}

function timerReset(){
  timerStop();
  timerSeconds=0;
  timerLockedMode=null;
  D.timerSeconds=0;
  D.timerMode=timerMode;
  D.timerRunning=false;
  D.timerStartedAt=null;
  D.timerTotal=null;
  persistTimers();
  const btn=document.getElementById('timer-btn');
  if(btn){btn.textContent='▶ شروع';btn.style.background='var(--charcoal2)';btn.style.border='none';btn.style.color='#fff';}
  renderTimerDisplay();
  renderGlobalTimerBar();
}

function updateTimerStats(){
  const el=document.getElementById('timer-today');
  if(!el)return;
  const key='timer-today-'+new Date().toISOString().split('T')[0];
  const secs=parseInt(localStorage.getItem(key)||'0');
  el.textContent=toFa(Math.floor(secs/60))+' دقیقه';
}

// ── STOPWATCH ─────────────────────────────────────────────────────────────────
function swToggle(){
  if(stopwatchRunning) swStop();
  else swStart();
}
function swStart(){
  stopwatchRunning=true;
  // ذخیره startedAt برای سینک cross-device
  D.swRunning=true;
  D.swStartedAt=new Date().toISOString();
  D.swSeconds=stopwatchSeconds;
  persistTimers();
  const btn=document.getElementById('sw-btn');
  if(btn){btn.textContent='⏸ توقف';btn.style.background='var(--bg3)';btn.style.border='1px solid var(--border)';btn.style.color='var(--text2)';}
  stopwatchInterval=setInterval(()=>{
    stopwatchSeconds++;
    const sw=stopwatchSeconds;
    const swH=Math.floor(sw/3600), swM=Math.floor((sw%3600)/60), swS=sw%60;
    const swStr=swH>0
      ?`${toFa(swH)}:${toFa(swM).padStart(2,'۰')}:${toFa(swS).padStart(2,'۰')}`
      :`${toFa(swM).padStart(2,'۰')}:${toFa(swS).padStart(2,'۰')}`;
    const dispEl=document.querySelector('#content .sw-display');
    if(dispEl) dispEl.textContent=swStr;
    renderGlobalTimerBar();
  },1000);
  renderGlobalTimerBar();
}

function swStop(){
  if(!stopwatchRunning) return;
  stopwatchRunning=false;
  clearInterval(stopwatchInterval);
  stopwatchInterval=null;
  D.swSeconds=stopwatchSeconds;
  D.swRunning=false;
  D.swStartedAt=null;
  persistTimers();
  const btn=document.getElementById('sw-btn');
  if(btn){btn.textContent='▶ شروع';btn.style.background='var(--charcoal2)';btn.style.border='none';btn.style.color='#fff';}
  renderGlobalTimerBar();
}
function swReset(){
  swStop();
  stopwatchSeconds=0;
  D.swSeconds=0;
  D.swRunning=false;
  D.swStartedAt=null;
  persistTimers();
  render();
}

// ── GLOBAL TIMER BUBBLE ───────────────────────────────────────────────────────
function renderGlobalTimerBar(){
  const bar=document.getElementById('_global-timer-bar');
  if(bar) bar.remove();
}

// ── PERSIST TIMERS ────────────────────────────────────────────────────────────
// ذخیره سینکرون (local) + async (cloud) — بدون await
function persistTimers(){
  localStorage.setItem(SK, JSON.stringify(D));
  if(window._sbUser){
    const now=new Date().toISOString();
    window._supa.from('user_data')
      .upsert({id:window._sbUser.id, data:JSON.stringify(D), updated_at:now})
      .then(({error})=>{ if(!error) localStorage.setItem(SK+'_ts', new Date(now).getTime()); });
  }
}

// ذخیره async با await — برای logout که باید مطمئن بشیم cloud دریافت کرده
async function persistTimersAndWait(){
  // اگه زمانسنج‌ها در حال اجران، اول متوقفشون کن تا مقدار آپدیت بشه
  if(stopwatchRunning) swStop();
  if(timerRunning) timerStop();
  localStorage.setItem(SK, JSON.stringify(D));
  if(window._sbUser){
    try{
      const now=new Date().toISOString();
      const {error}=await window._supa.from('user_data')
        .upsert({id:window._sbUser.id, data:JSON.stringify(D), updated_at:now});
      if(!error) localStorage.setItem(SK+'_ts', new Date(now).getTime());
    }catch(e){}
  }
}

async function doResetPassword(){
  const p1=document.getElementById('reset-pass').value;
  const p2=document.getElementById('reset-pass2').value;
  const err=document.getElementById('reset-err');
  err.style.display='none';
  if(!p1||p1.length<6){err.textContent='رمز باید حداقل ۶ کاراکتر باشد';err.style.display='block';return;}
  if(p1!==p2){err.textContent='رمزها با هم مطابقت ندارند';err.style.display='block';return;}
  const {error}=await window._supa.auth.updateUser({password:p1});
  if(error){err.textContent='خطا در ذخیره رمز. دوباره تلاش کنید.';err.style.display='block';}
  else{
    window._isPasswordRecovery=false;
    document.getElementById('reset-screen').style.display='none';
    showToast('رمز با موفقیت تغییر کرد ✓','success');
  }
}

async function doForgotPassword(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  if(!email){showToast('ابتدا ایمیلت رو وارد کن','warn');return;}
  const {error}=await window._supa.auth.resetPasswordForEmail(email,{redirectTo:"https://behnamkiae50-star.github.io/study-tracker/"});
  if(error) showToast('خطا در ارسال ایمیل','error');
  else showToast('لینک بازیابی به ایمیلت ارسال شد ✓','success');
}

async function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const p=document.getElementById('login-pass').value;
  const err=document.getElementById('login-err');
  const loading=document.getElementById('login-loading');
  err.style.display='none';
  loading.style.display='block';
  const {error}=await window._supa.auth.signInWithPassword({email,password:p});
  loading.style.display='none';
  if(error){
    err.style.display='block';
    document.getElementById('login-pass').value='';
  } else {
    setTimeout(showMotivationalPopup, 1200);
  }
}

async function doLogout(){
  showToast('در حال ذخیره...','info');
  await persistTimersAndWait(); // صبر می‌کنیم cloud تأیید کنه
    await window._supa.auth.signOut();
  currentUser=null;
  D={courses:[],chapters:[],topics:[],subtopics:[]};
  P={theme:'dark'};
  showLoginScreen();
}

// ذخیره موقع بستن/رفرش صفحه (فقط local — browser async نمیذاره)
// وقتی کاربر به این تب برمیگرده، بنر رو دوباره چک کن
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && currentUser){
        updateSidebarReview();
  }
});

window.addEventListener('beforeunload', ()=>{
  if(stopwatchRunning){ D.swSeconds=stopwatchSeconds; }
  if(timerRunning){ D.timerSeconds=timerSeconds; D.timerMode=timerMode; }
  localStorage.setItem(SK, JSON.stringify(D));
});

// Ctrl+S دستی
document.addEventListener('keydown',(e)=>{
  if((e.ctrlKey||e.metaKey) && e.key==='s'){
    e.preventDefault();
    persistTimers();
    showToast('ذخیره شد ✓','success');
  }
});

// Supabase Auth state listener
window.addEventListener('fb-login', async (e)=>{
  const user = e.detail;
  const wasLoggedIn = !!currentUser;
  const showMotivational = !!window._showMotivationalOnLogin;
  window._showMotivationalOnLogin = false;
  currentUser = user.id;
  SK = userSK(user.id);
  PK = userPK(user.id);
  D=ld(); P=lp();
  ldSw();
  hideLoginScreen();
  applyTheme();
  applySidebar();
    if(!wasLoggedIn) goto('dashboard');
  else render();
  setTimeout(updateSidebarReview,500);
  if(showMotivational) setTimeout(showMotivationalPopup,800);
  resetInactivityTimer();
  await syncFromCloud(user.id);
  startAutoSync(user.id);
  if(!wasLoggedIn) showToast('خوش آمدید ☁️','success');
});

window.addEventListener('fb-logout', ()=>{
  stopAutoSync();
  showLoginScreen();
});

setTimeout(()=>{
  if(!window._sbUser) showLoginScreen();
}, 1500);
</script>
<script>
function showToast(msg,type='info'){
  const existing=document.getElementById('_toast');
  if(existing)existing.remove();
  const colors={success:'#3dd68c',info:'#5b9ef5',warn:'#f5c842',error:'#f06b6b'};
  const t=document.createElement('div');
  t.id='_toast';t.textContent=msg;
  t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:'+colors[type]+';color:#fff;padding:10px 20px;border-radius:12px;font-family:inherit;font-size:13px;font-weight:600;z-index:99999;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,0.4);';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3500);
}
</script>
